openapi: 3.0.0
info:
  title: OAuth 2.0 Token Endpoint (RFC 6749 Section 3.2)
  version: 1.0.0
servers:
  - url: https://as.example.com
paths:
  /token:
    post:
      summary: Request an access token
      description: The client exchanges an authorization grant for an access token.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  description: >-
                    The grant type. ZETA Clients use
                    `urn:ietf:params:oauth:grant-type:token-exchange` (RFC 8693) to
                    obtain DPoP-bound access tokens, or `refresh_token` for renewals.
                  enum:
                    - authorization_code
                    - password
                    - client_credentials
                    - refresh_token
                    - urn:ietf:params:oauth:grant-type:token-exchange
                code:
                  type: string
                  description: The authorization code received in the previous step (for 'authorization_code' grant type only).
                redirect_uri:
                  type: string
                  description: The redirection URI is used in the authorization request (for 'authorization_code' grant type only).
                username:
                  type: string
                  description: The resource owner username (for 'password' grant type only).
                password:
                  type: string
                  description: The resource owner password (for 'password' grant type only).
                refresh_token:
                  type: string
                  description: The refresh token, which is used to get new access tokens using the same authorization grant as described in Section 6 (for 'refresh_token' grant type only).
                scope:
                  type: string
                  description: The scope of the access request as described by Section 3.3.
                audience:
                  type: string
                  deprecated: true
                  description: >-
                    LEGACY (contract v1). The logical, deployment-independent
                    audience identifier written verbatim into the `aud` claim of
                    the issued access token. Retained for backward compatibility;
                    new clients SHOULD send `resource` instead and let the
                    Authorization Server derive the `aud` claim from the Policy
                    Engine decision. Tokens issued via this parameter carry
                    `ver: 1` (or omit `ver`).
                resource:
                  type: string
                  format: uri
                  description: >-
                    Resource indicator (RFC 8707), contract v2. Absolute URL of the
                    target endpoint at the resource server (discovered from the
                    protected resource metadata `resource` field). When present,
                    the Authorization Server derives the logical `aud` claim from
                    the Policy Engine (OPA) decision for this resource and issues
                    the token with `ver: 2`; the URL itself is NOT written into
                    `aud` but is bound to the request via the DPoP `htu` claim
                    (RFC 9449) on the subsequent resource call. An Authorization
                    Server that does not support resource indicators MUST respond
                    with the `invalid_target` error (RFC 8707).
                subject_token:
                  type: string
                  description: The subject token (RFC 8693). REQUIRED for the token-exchange grant.
                subject_token_type:
                  type: string
                  description: Type of the subject_token (RFC 8693). REQUIRED for the token-exchange grant.
                client_assertion_type:
                  type: string
                  description: Format of the client assertion (RFC 7521/RFC 7523).
                client_assertion:
                  type: string
                  description: The Private Key JWT authenticating the client (RFC 7521/RFC 7523).
                client_id:
                  type: string
                  description: The client identifier is issued to the client during the registration process described by Section 2.2.
                client_secret:
                  type: string
                  description: The client secret.
              required:
                - grant_type
      responses:
        200:
          description: Successful response with access token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: The access token is issued by the authorization server.
                  token_type:
                    type: string
                    description: The type of the token issued.
                  expires_in:
                    type: integer
                    description: The lifetime in seconds of the access token.
                  refresh_token:
                    type: string
                    description: The refresh token, which can be used to get new access tokens using the same authorization grant as described in Section 6.
                  scope:
                    type: string
                    description: The scope of the access token as described by Section 3.3.
        400:
          description: Invalid request, such as missing parameters or invalid client credentials.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: An error code.
                  error_description:
                    type: string
                    description: A human-readable description of the error.
                  error_uri:
                    type: string
                    description: A URI pointing to a web page with more information about the error.
