# Policy Engine Input Schema for ZETA Guard
# This schema combines authorization_request data, client-statement.yaml and user-info.yaml.
$schema: "http://json-schema.org/draft-07/schema#"
title: Policy Engine Input Schema for ZETA Guard
type: object
description: >
  Schema for OPA policy decisions based on client registration data, client
  assertion, user info and authorization request. This schema is used as input
  for the OPA policy engine.
properties:
  version:
    description: The version of the schema
    type: string
    const: "1.0"
  client_registration_data:
    description: The client registration data stored at the authorization server.
    "$ref": "./policy-engine-client-data.yaml"
  user_info:
    description: The user information data
    "$ref": "./user-info.yaml"
  authorization_request:
    description: The authorization request data
    type: object
    properties:
      scopes:
        type: array
        description: The purpose of use for the authorization
        items:
          type: string
      audience:
        type: array
        description: >-
          The logical, deployment-independent audience identifier(s) of the target
          service for the requested token (e.g. "zeta-resource-server",
          "zeta-notification-server", "zeta-client-management"). Derived by the AuthS
          from the request's `resource` parameter (see `resource` below); MUST NOT be
          the environment-specific resource URL.
        items:
          type: string
      resource:
        type: array
        description: >-
          The resource indicator(s) from the token request (RFC 8707): absolute
          resource URL(s) the client requests the access token for. The AuthS maps
          each resource to its logical `audience` and uses it for the scope/audience
          policy decision. Optional for backwards compatibility.
        items:
          type: string
          format: uri
      country_code:
        type: string
        description: "ISO 3166-1 alpha-2 country code of the source IP, resolved by
          AuthS via GeoIP."
        pattern: "^[A-Z]{2}$"
      http_method:
        type: string
        description: The HTTP method of the request.
        enum:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - HEAD
          - OPTIONS
      ip_address:
        type: string
        description: The source IP address of the request.
      previous_ip_address:
        type: string
        description: The previously used source IP address; for impossible travel detection
      grant_type:
        type: string
        description: The OAuth 2.0 grant type being used.
        enum:
          - authorization_code
          - urn:ietf:params:oauth:grant-type:token-exchange
          - client_credentials
          - refresh_token
          - urn:ietf:params:oauth:grant-type:jwt-bearer
      amr:
        type: array
        description: Methods used for user authentication (Authentication Methods
          References).
        items:
          type: string
      acr:
        type: string
        description: Authentication Context Class Reference (e.g. 'loa2').
    required:
      - scopes
      - audience
      - ip_address
      - previous_ip_address
      - grant_type
      - amr
  delegation_context:
    description: The delegation context if the client is acting on behalf of a user.
    type: [ "object", "null" ]
    properties:
      principal_user_info:
        $ref: "./user-info.yaml"
      allowed_scopes:
        type: array
        items:
          type: string
      valid_until:
        type: integer
    required:
      - principal_user_info
      - allowed_scopes
      - valid_until
required:
  - version
  - client_registration_data
  - user_info
  - authorization_request
