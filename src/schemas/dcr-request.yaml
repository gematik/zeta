$schema: "http://json-schema.org/draft-07/schema#"
title: RegistrationRequest
description: Payload Schema für den DCR POST /register Body
type: object

oneOf:
  # -----------------------------------------------------------------
  # 1. TPM Hardware Attestation (Windows / Linux)
  # -----------------------------------------------------------------
  - title: TPM Attestation
    required:
      - attestation_type
      - PuK.Client.Sig
      - PuK.EK.Enc
      - C.EK.Enc
      - PuK.AK.Sig
      - signed_Hash_PuK.Client.Sig
    properties:
      attestation_type:
        type: string
        const: tpm
      client_name: { type: string }
      token_endpoint_auth_method: { type: string }
      grant_types:
        type: array
        items: { type: string }
      jwks:
        type: object
        properties:
          keys:
            type: array
            items: { $ref: "#/definitions/JWK" }
        required: [keys]
      PuK.Client.Sig:
        $ref: "#/definitions/JWK"
        description: >-
          Öffentlicher Client-Signaturschlüssel (ECDSA P-256) der Anwendung.
          Wird vom AuthS als client_id gespeichert.
      PuK.EK.Enc:
        $ref: "#/definitions/JWK"
        description: >-
          Öffentlicher Endorsement Key (EK) des TPM (RSA oder ECC).
          Wird zur MakeCredential-Operation verwendet.
      C.EK.Enc:
        type: string
        description: >-
          Vom AuthS ausgestelltes CredentialBlob, Base64url-kodiert.
          Enthält ein mit PuK.EK.Enc verschlüsseltes Secret zur
          Verifikation der TPM-Bindung (TPM2_MakeCredential).
      PuK.AK.Sig:
        type: string
        description: >-
          Öffentlicher Attestation Key (AK) des TPM, Base64url-kodiert
          (TPM2B_PUBLIC Struktur). Wird vom AuthS zur Verifikation der
          TPM-Quote und von signed_Hash_PuK.Client.Sig verwendet.
      signed_Hash_PuK.Client.Sig:
        type: string
        description: >-
          Signatur des SHA-256-Hashes von PuK.Client.Sig, erstellt mit
          dem TPM Attestation Key (PuK.AK.Sig). Base64url-kodiert.

  # -----------------------------------------------------------------
  # 2. Apple Hardware Attestation (iOS, iPadOS & macOS)
  # -----------------------------------------------------------------
  # Die Apple App Attest API (DeviceCheck-Framework) ist auf iOS,
  # iPadOS und macOS identisch: gleiches CBOR-Format, gleiche Felder
  # (attStmt mit x5c + receipt, authData) und gleiches Key-Binding.
  # -----------------------------------------------------------------
  - title: Apple Attestation
    required:
      - attestation_type
      - PuK.Client.Sig
      - PuK.AK.Sig
      - Apple_Attestation_Object
      - signed_Hash_PuK.Client.Sig
    description: >-
      Für iOS, iPadOS und macOS identisch. Die Apple App Attest API
      (DeviceCheck-Framework) produziert auf allen Plattformen dasselbe
      Objekt-Format und Key-Binding-Protokoll.
    properties:
      attestation_type:
        type: string
        const: apple
      client_name: { type: string }
      token_endpoint_auth_method: { type: string }
      grant_types:
        type: array
        items: { type: string }
      jwks:
        type: object
        properties:
          keys:
            type: array
            items: { $ref: "#/definitions/JWK" }
        required: [keys]
      PuK.Client.Sig:
        $ref: "#/definitions/JWK"
        description: >-
          Öffentlicher Client-Signaturschlüssel (ECDSA P-256) der Anwendung.
          Wird vom AuthS als client_id gespeichert.
      PuK.AK.Sig:
        type: string
        description: >-
          Öffentlicher App-Attest-Schlüssel (ECDSA P-256) aus der Secure
          Enclave des Geräts. Base64url-kodiert.
      Apple_Attestation_Object:
        type: string
        description: >-
          CBOR-kodiertes Attestation-Objekt der Apple App Attest API
          (fmt: "apple-appattest"). Enthält attStmt (x5c-Zertifikatskette
          + receipt) sowie authData (rpIdHash, counter, credentialId).
          Base64-kodiert.
      signed_Hash_PuK.Client.Sig:
        type: string
        description: >-
          Signatur des SHA-256-Hashes von PuK.Client.Sig, erstellt mit
          dem App-Attest-Schlüssel (PuK.AK.Sig). Base64url-kodiert.

  # -----------------------------------------------------------------
  # 3. Android Hardware Attestation
  # -----------------------------------------------------------------
  # Nutzt die Android Keystore Key Attestation (TEE / StrongBox).
  # Der AuthS validiert die Zertifikatskette gegen die Google Hardware
  # Attestation Root CA. Optional kann ein Play Integrity Token zur
  # zusätzlichen App-Integritätsprüfung mitgeliefert werden.
  # -----------------------------------------------------------------
  - title: Android Attestation
    required:
      - attestation_type
      - PuK.Client.Sig
      - PuK.AK.Sig
      - Android_Key_Attestation_Certificate_Chain
      - signed_Hash_PuK.Client.Sig
    properties:
      attestation_type:
        type: string
        const: android
      client_name: { type: string }
      token_endpoint_auth_method: { type: string }
      grant_types:
        type: array
        items: { type: string }
      jwks:
        type: object
        properties:
          keys:
            type: array
            items: { $ref: "#/definitions/JWK" }
        required: [keys]
      PuK.Client.Sig:
        $ref: "#/definitions/JWK"
        description: >-
          Öffentlicher Client-Signaturschlüssel (ECDSA P-256) der Anwendung.
          Wird vom AuthS als client_id gespeichert.
      PuK.AK.Sig:
        type: string
        description: >-
          Öffentlicher Android-Keystore-Attestierungsschlüssel (ECDSA P-256
          oder RSA), erzeugt im TEE oder StrongBox des Geräts.
          Base64url-kodiert. Muss mit dem Blatt-Zertifikat der
          Android_Key_Attestation_Certificate_Chain übereinstimmen.
      Android_Key_Attestation_Certificate_Chain:
        type: array
        description: >-
          X.509-Zertifikatskette der Android Key Attestation, beginnend
          mit dem Blatt-Zertifikat des attestierten Schlüssels bis zur
          Google Hardware Attestation Root CA. Jedes Zertifikat ist
          Base64-kodiert (DER-Format).
        items:
          type: string
          description: Base64-kodiertes DER X.509-Zertifikat.
        minItems: 3
      signed_Hash_PuK.Client.Sig:
        type: string
        description: >-
          Signatur des SHA-256-Hashes von PuK.Client.Sig, erstellt mit
          dem Android-Keystore-Schlüssel (PuK.AK.Sig). Base64url-kodiert.
      play_integrity_token:
        type: string
        description: >-
          Optionales Token der Google Play Integrity API (Base64-kodiert).
          Ermöglicht dem AuthS die zusätzliche App-Integritätsprüfung
          (meets_basic_integrity, meets_device_integrity).


  # -----------------------------------------------------------------
  # 4. ZETA Attestation Token (Fast-Path)
  # -----------------------------------------------------------------
  # Wird verwendet, wenn bereits ein gültiger ZETA Guard Attestation
  # Token vorliegt (aus einer früheren Hardware-Attestierung).
  # Der AuthS prüft Token-Signatur und extrahiert PuK.AK.Sig aus dem
  # Token, um signed_Hash_PuK.Client.Sig zu verifizieren.
  # -----------------------------------------------------------------
  - title: ZETA Attestation Token
    required:
      - attestation_type
      - PuK.Client.Sig
      - zeta_guard_attestation_token
      - signed_Hash_PuK.Client.Sig
    properties:
      attestation_type:
        type: string
        const: zeta_attestation_token
      client_name: { type: string }
      token_endpoint_auth_method: { type: string }
      grant_types:
        type: array
        items: { type: string }
      jwks:
        type: object
        properties:
          keys:
            type: array
            items: { $ref: "#/definitions/JWK" }
        required: [keys]
      PuK.Client.Sig:
        $ref: "#/definitions/JWK"
        description: >-
          Öffentlicher Client-Signaturschlüssel (ECDSA P-256) der Anwendung.
          Wird vom AuthS als client_id gespeichert.
      zeta_guard_attestation_token:
        type: string
        description: >-
          Signiertes JWT, ausgestellt vom ZETA Guard nach erfolgreicher
          Hardware-Attestierung. Enthält PuK.AK.Sig und verifizierte
          Plattform-Claims. Siehe zeta-attestation-token.yaml.
      signed_Hash_PuK.Client.Sig:
        type: string
        description: >-
          Signatur des SHA-256-Hashes von PuK.Client.Sig, erstellt mit
          dem im Token enthaltenen PuK.AK.Sig. Base64url-kodiert.

  # -----------------------------------------------------------------
  # 5. Legacy / Software Attestation
  # -----------------------------------------------------------------
  - title: Legacy / Software Attestation
    required:
      - client_name
      - jwks
      - token_endpoint_auth_method
    properties:
      attestation_type:
        type: string
        enum: [software]
      client_name: { type: string }
      token_endpoint_auth_method: { type: string }
      grant_types:
        type: array
        items: { type: string }
      jwks:
        type: object
        properties:
          keys:
            type: array
            items: { $ref: "#/definitions/JWK" }
        required: [keys]

definitions:
  JWK:
    type: object
    properties:
      kty: { type: string }
      crv: { type: string }
      x: { type: string }
      y: { type: string }
      n: { type: string }
      e: { type: string }
    required: [kty]
