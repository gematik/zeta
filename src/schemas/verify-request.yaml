$schema: "http://json-schema.org/draft-07/schema#"
title: Registration Verify Request
description: >-
  Payload für den POST /register/verify Request, um eine schwebende 
  Registrierung mittels eines Out-of-Band Codes (OTP) abzuschließen.
type: object
required:
  - transaction_id
  - code
properties:
  transaction_id:
    type: string
    format: uuid
    description: Die Transaktions-ID, die im 202 Accepted Request empfangen wurde.
  code:
    type: string
    description: Der vom Nutzer eingegebene Bestätigungscode (OTP).
    minLength: 4
    maxLength: 10
    example: "123456"
