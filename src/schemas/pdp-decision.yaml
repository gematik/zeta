$schema: "http://json-schema.org/draft-07/schema#"
schemaVersion: "1.1.0"
title: PDP Decision Response
description: Schema for the PDP Decision as provided by the OPA Policy Engine
  REST API (/v1/data/...).
type: object
properties:
  decision_id:
    description: Unique identifier for the decision (generated by OPA if decision
      logging is enabled).
    type: string
  result:
    type: object
    description: >
      The evaluated decision value. Contains 'allow' and either 'ttl' (on
      success) or 'reasons' (on denial).
    additionalProperties: false
    properties:
      allow:
        description: Whether the access is allowed or not.
        type: boolean
      ttl:
        description: >
          Time to live for the issued tokens. Only present when allow is true.
        type: object
        additionalProperties: false
        properties:
          access_token:
            type: integer
          refresh_token:
            type: integer
        required:
          - access_token
          - refresh_token
      aud:
        description: >
          The logical, deployment-independent audience identifier assigned by the
          Policy Engine for the issued access token (contract v2). The
          Authorization Server writes this value into the `aud` claim and sets
          `ver: 2`. Only present when `allow` is true and the request supplied a
          `resource` indicator (RFC 8707). Absent for legacy (contract v1)
          decisions, where `aud` is taken verbatim from the client-supplied
          `audience` parameter.
        oneOf:
          - type: array
            items:
              type: string
          - type: string
      reasons:
        description: >
          Map of denial reasons. Keys are human-readable reason strings, values
          are always true.
        type: object
        additionalProperties:
          type: boolean
    required:
      - allow
required:
  - result
