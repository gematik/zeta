name: Markdown Quality Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint*.yaml"
      - ".markdownlintignore"
      - "scripts/cspell.json"
      - ".cspell/**"
      - "scripts/check-markdown.sh"
      - ".github/workflows/markdown-check.yml"
  push:
    branches: [main, develop]
    paths:
      - "**/*.md"

permissions:
  contents: read

jobs:
  markdown-check:
    name: Lint, Spelling & Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: |
          npm install -g \
            markdownlint-cli2 \
            cspell \
            @cspell/dict-de-de
          # cspell: deutsches Wörterbuch global verlinken
          cspell link add @cspell/dict-de-de || true

      - name: Install lychee (link checker)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 8
            --exclude-path tmp
            --exclude-path .venv
            --exclude-path zeta-guard-provisioning
            --exclude-path zeta-guard-prv-signing-key
            './**/*.md'
          fail: true
          format: markdown
          output: ./lychee-report.md

      - name: Markdown Lint
        run: markdownlint-cli2 "**/*.md"

      - name: Spell Check (cspell)
        run: cspell --no-progress --no-must-find-files --config scripts/cspell.json "**/*.md"

      - name: Upload lychee report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md
          if-no-files-found: ignore
