etica" font-size="10" x="299.9185" y="3309.7979">(Admin rights)</text><rect fill="#E2E2F0" height="25.6406" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="34.7666" x="559.0044" y="3281.875"/><text fill="#000000" font-family="Helvetica" font-size="10" x="566.0044" y="3298.1572">TPM</text><rect fill="#E2E2F0" height="37.2813" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="78.8535" x="613.771" y="3281.875"/><text fill="#000000" font-family="Helvetica" font-size="10" x="620.771" y="3298.1572">Konnektor or</text><text fill="#000000" font-family="Helvetica" font-size="10" x="624.7773" y="3309.7979">TI-Gateway</text><rect fill="#E2E2F0" height="25.6406" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="54.2295" x="735.2793" y="3281.875"/><text fill="#000000" font-family="Helvetica" font-size="10" x="742.2793" y="3298.1572">SM(C)-B</text><rect fill="#E2E2F0" height="37.2813" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="116.9492" x="809.5088" y="3281.875"/><text fill="#000000" font-family="Helvetica" font-size="10" x="858.103" y="3298.1572">PDP</text><text fill="#000000" font-family="Helvetica" font-size="10" x="816.5088" y="3309.7979">Authorization Server</text><rect fill="#E2E2F0" height="37.2813" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="61.7148" x="1095.4336" y="3281.875"/><text fill="#000000" font-family="Helvetica" font-size="10" x="1116.4106" y="3298.1572">PDP</text><text fill="#000000" font-family="Helvetica" font-size="10" x="1102.4336" y="3309.7979">Database</text><rect fill="#E2E2F0" height="37.2813" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="80.5723" x="1167.1484" y="3281.875"/><text fill="#000000" font-family="Helvetica" font-size="10" x="1197.5542" y="3298.1572">PDP</text><text fill="#000000" font-family="Helvetica" font-size="10" x="1174.1484" y="3309.7979">Policy Engine</text><polygon fill="#181818" points="850.9834,114.8438,860.9834,118.8438,850.9834,122.8438,854.9834,118.8438" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="856.9834" y1="118.8438" y2="118.8438"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="114.4854">(01)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="114.4854">GET /nonce</text><polygon fill="#181818" points="71.5,140.4844,61.5,144.4844,71.5,148.4844,67.5,144.4844" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="65.5" x2="861.9834" y1="144.4844" y2="144.4844"/><text fill="#000000" font-family="Helvetica" font-size="10" x="77.5" y="140.126">(02)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="102.0273" y="140.126">return 200 OK new-nonce: nonce</text><path d="M19.3848,156.4844 L79.3408,156.4844 L79.3408,160.125 L69.3408,170.125 L19.3848,170.125 L19.3848,156.4844" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="2444.6094" style="stroke:#000000;stroke-width:1.5;" width="1127.9063" x="19.3848" y="156.4844"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="34.3848" y="166.7666">alt</text><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="94.3408" y="167.7666">[Initial SM(C)-B Token Exchangewith Attestation]</text><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="19.3848" x2="1147.291" y1="2175" y2="2175"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="24.3848" y="2186.2822">[Refresh Token use (without Attestation)]</text><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="102.5" y1="197.7656" y2="197.7656"/><line style="stroke:#181818;stroke-width:1;" x1="102.5" x2="102.5" y1="197.7656" y2="210.7656"/><line style="stroke:#181818;stroke-width:1;" x1="61.5" x2="102.5" y1="210.7656" y2="210.7656"/><polygon fill="#181818" points="71.5,206.7656,61.5,210.7656,71.5,214.7656,67.5,210.7656" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="193.4072">(03)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="193.4072">Create DPoP Key Pair (for Token Exchange)</text><path d="M321.2002,185.125 L321.2002,206.125 L547.2002,206.125 L547.2002,195.125 L537.2002,185.125 L321.2002,185.125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M537.2002,185.125 L537.2002,195.125 L547.2002,195.125 L537.2002,185.125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="327.2002" y="199.4072">Session-based Key Pair for DPoP binding.</text><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="102.5" y1="236.4063" y2="236.4063"/><line style="stroke:#181818;stroke-width:1;" x1="102.5" x2="102.5" y1="236.4063" y2="249.4063"/><line style="stroke:#181818;stroke-width:1;" x1="61.5" x2="102.5" y1="249.4063" y2="249.4063"/><polygon fill="#181818" points="71.5,245.4063,61.5,249.4063,71.5,253.4063,67.5,249.4063" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="232.0479">(04)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="232.0479">Calculate attestation_challenge</text><path d="M261.957,223.7656 L261.957,279.7656 L554.957,279.7656 L554.957,233.7656 L544.957,223.7656 L261.957,223.7656" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M544.957,223.7656 L544.957,233.7656 L554.957,233.7656 L544.957,223.7656" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="267.957" y="238.0479">The attestation_challenge is a cryptographic hash</text><text fill="#000000" font-family="Helvetica" font-size="10" x="267.957" y="249.6885">of the Public Client Instance Key Hash and a nonce.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="267.957" y="261.3291">It is used to bind the attestation to the client instance.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="267.957" y="272.9697">attestation_challenge = HASH(pubKeyHash + nonce)</text><path d="M38.3848,289.3281 L98.3408,289.3281 L98.3408,292.9688 L88.3408,302.9688 L38.3848,302.9688 L38.3848,289.3281" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="1141.2031" style="stroke:#000000;stroke-width:1.5;" width="809.0117" x="38.3848" y="289.3281"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="53.3848" y="299.6104">alt</text><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="113.3408" y="300.6104">[ZETA Attestation Service available]</text><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="38.3848" x2="847.3965" y1="1162.3594" y2="1162.3594"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="43.3848" y="1173.6416">[Fallback: Software-basierte Attestierung]</text><polygon fill="#181818" points="318.7852,338.25,328.7852,342.25,318.7852,346.25,322.7852,342.25" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="324.7852" y1="342.25" y2="342.25"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="332.0713">(05)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="326.251">Get Attestation</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="337.8916">with `attestation_challenge`</text><path d="M345.7852,317.9688 L345.7852,420.9688 L715.7852,420.9688 L715.7852,327.9688 L705.7852,317.9688 L345.7852,317.9688" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M705.7852,317.9688 L705.7852,327.9688 L715.7852,327.9688 L705.7852,317.9688" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="351.7852" y="332.251">The Prim&#228;rsystem (PS) and the ZETA Attestation Service (ZTA) are</text><text fill="#000000" font-family="Helvetica" font-size="10" x="351.7852" y="343.8916">in the same trust domain. At the time of client installation, the ZTA</text><text fill="#000000" font-family="Helvetica" font-size="10" x="351.7852" y="355.5322">computes a cryptographic hash of the PS software and extends this</text><text fill="#000000" font-family="Helvetica" font-size="10" x="351.7852" y="367.1729">hash into a specific PCR (22 or 23) using TPM2_PCR_Extend. The</text><text fill="#000000" font-family="Helvetica" font-size="10" x="351.7852" y="378.8135">ZTA reads and stores the resulting PCR value as a reference</text><text fill="#000000" font-family="Helvetica" font-size="10" x="351.7852" y="390.4541">measurement or baseline. At every start of the PS, the ZTA measures</text><text fill="#000000" font-family="Helvetica" font-size="10" x="351.7852" y="402.0947">the PS software and extends the resulting hash into the same PCR</text><text fill="#000000" font-family="Helvetica" font-size="10" x="351.7852" y="413.7354">(22 or 23) using TPM2_PCR_Extend.</text><path d="M319.7852,430.0938 L379.7412,430.0938 L379.7412,433.7344 L369.7412,443.7344 L319.7852,443.7344 L319.7852,430.0938" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="199.7656" style="stroke:#000000;stroke-width:1.5;" width="361.5029" x="319.7852" y="430.0938"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="334.7852" y="440.376">alt</text><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="394.7412" y="441.376">[ZETA TPM Service has no TPM Attestation Key]</text><polygon fill="#181818" points="559.3877,479.0156,569.3877,483.0156,559.3877,487.0156,563.3877,483.0156" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="340.7852" x2="565.3877" y1="483.0156" y2="483.0156"/><text fill="#000000" font-family="Helvetica" font-size="10" x="347.7852" y="472.8369">(06)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="467.0166">Generate Attestation Key Pair (AK)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="478.6572">and Get AK Handle</text><polygon fill="#181818" points="351.7852,516.2969,341.7852,520.2969,351.7852,524.2969,347.7852,520.2969" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="345.7852" x2="570.3877" y1="520.2969" y2="520.2969"/><text fill="#000000" font-family="Helvetica" font-size="10" x="357.7852" y="510.1182">(07)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="382.3125" y="504.2979">Return Attestation Public Key</text><text fill="#000000" font-family="Helvetica" font-size="10" x="382.3125" y="515.9385">and AK Handle</text><polygon fill="#181818" points="559.3877,541.9375,569.3877,545.9375,559.3877,549.9375,563.3877,545.9375" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="340.7852" x2="565.3877" y1="545.9375" y2="545.9375"/><text fill="#000000" font-family="Helvetica" font-size="10" x="347.7852" y="541.5791">(08)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="541.5791">Get Certificate Chain</text><polygon fill="#181818" points="351.7852,567.5781,341.7852,571.5781,351.7852,575.5781,347.7852,571.5781" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="345.7852" x2="570.3877" y1="571.5781" y2="571.5781"/><text fill="#000000" font-family="Helvetica" font-size="10" x="357.7852" y="567.2197">(09)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="382.3125" y="567.2197">Return Certificate Chain</text><line style="stroke:#181818;stroke-width:1;" x1="340.7852" x2="382.7852" y1="608.8594" y2="608.8594"/><line style="stroke:#181818;stroke-width:1;" x1="382.7852" x2="382.7852" y1="608.8594" y2="621.8594"/><line style="stroke:#181818;stroke-width:1;" x1="341.7852" x2="382.7852" y1="621.8594" y2="621.8594"/><polygon fill="#181818" points="351.7852,617.8594,341.7852,621.8594,351.7852,625.8594,347.7852,621.8594" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="347.7852" y="598.6807">(10)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="592.8604">Store AK Handle, AK Public Key</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="604.501">and Certificate Chain</text><line style="stroke:#181818;stroke-width:1;" x1="340.7852" x2="382.7852" y1="661.5" y2="661.5"/><line style="stroke:#181818;stroke-width:1;" x1="382.7852" x2="382.7852" y1="661.5" y2="674.5"/><line style="stroke:#181818;stroke-width:1;" x1="341.7852" x2="382.7852" y1="674.5" y2="674.5"/><polygon fill="#181818" points="351.7852,670.5,341.7852,674.5,351.7852,678.5,347.7852,674.5" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="347.7852" y="657.1416">(11)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="657.1416">Select AK Handle</text><polygon fill="#181818" points="559.3877,742.7031,569.3877,746.7031,559.3877,750.7031,563.3877,746.7031" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="340.7852" x2="565.3877" y1="746.7031" y2="746.7031"/><text fill="#000000" font-family="Helvetica" font-size="10" x="347.7852" y="719.0635">(12)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="695.7822">Get TPM Quote for PCRs</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="707.4229">(4, 5, 7, 10, 11, 22 or 23)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="719.0635">and `attestation_challenge`</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="730.7041">(as qualifyingData),</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="742.3447">signed with AK</text><path d="M59.3848,687.5 L59.3848,731.5 L330.3848,731.5 L330.3848,697.5 L320.3848,687.5 L59.3848,687.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M320.3848,687.5 L320.3848,697.5 L330.3848,697.5 L320.3848,687.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="65.3848" y="701.7822">Binding: `attestation_challenge` enth&#228;lt Hash des</text><text fill="#000000" font-family="Helvetica" font-size="10" x="65.3848" y="713.4229">Client Instance Public Keys und die Nonce.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="65.3848" y="725.0635">Das TPM signiert PCRs + `attestation_challenge`.</text><path d="M586.3877,687.5 L586.3877,766.5 L826.3877,766.5 L826.3877,697.5 L816.3877,687.5 L586.3877,687.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M816.3877,687.5 L816.3877,697.5 L826.3877,697.5 L816.3877,687.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="592.3877" y="701.7822">PCR 4: Boot Loader Code, Digest</text><text fill="#000000" font-family="Helvetica" font-size="10" x="592.3877" y="713.4229">PCR 5: Boot Loader Configuration, Digest</text><text fill="#000000" font-family="Helvetica" font-size="10" x="592.3877" y="725.0635">PCR 7: Secure Boot State / Policy, Digest</text><text fill="#000000" font-family="Helvetica" font-size="10" x="592.3877" y="736.7041">PCR   10:OS Kernel / IMA, Digest</text><text fill="#000000" font-family="Helvetica" font-size="10" x="592.3877" y="748.3447">PCR 11: OS Components / VSM, Digest,</text><text fill="#000000" font-family="Helvetica" font-size="10" x="592.3877" y="759.9854">PCR 22 or 23 (if available) App Data, Digest</text><polygon fill="#181818" points="351.7852,785.9844,341.7852,789.9844,351.7852,793.9844,347.7852,789.9844" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="345.7852" x2="570.3877" y1="789.9844" y2="789.9844"/><text fill="#000000" font-family="Helvetica" font-size="10" x="357.7852" y="785.626">(13)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="382.3125" y="785.626">Return TPM Quote</text><line style="stroke:#181818;stroke-width:1;" x1="340.7852" x2="382.7852" y1="815.625" y2="815.625"/><line style="stroke:#181818;stroke-width:1;" x1="382.7852" x2="382.7852" y1="815.625" y2="828.625"/><line style="stroke:#181818;stroke-width:1;" x1="341.7852" x2="382.7852" y1="828.625" y2="828.625"/><polygon fill="#181818" points="351.7852,824.625,341.7852,828.625,351.7852,832.625,347.7852,828.625" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="347.7852" y="811.2666">(14)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="372.3125" y="811.2666">Get TCG Event Log (from OS/Firmware)</text><path d="M581.3877,802.9844 L581.3877,858.9844 L825.3877,858.9844 L825.3877,812.9844 L815.3877,802.9844 L581.3877,802.9844" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M815.3877,802.9844 L815.3877,812.9844 L825.3877,812.9844 L815.3877,802.9844" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="587.3877" y="817.2666">Quote contains:</text><text fill="#000000" font-family="Helvetica" font-size="10" x="587.3877" y="828.9072">- `attestation_challenge` (as qualifyingData)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="587.3877" y="840.5479">- Attested Data (PCR Select, PCR Digest),</text><text fill="#000000" font-family="Helvetica" font-size="10" x="587.3877" y="852.1885">- Signature</text><polygon fill="#181818" points="71.5,889.8281,61.5,893.8281,71.5,897.8281,67.5,893.8281" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="65.5" x2="329.7852" y1="893.8281" y2="893.8281"/><text fill="#000000" font-family="Helvetica" font-size="10" x="77.5" y="883.6494">(15)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="102.0273" y="877.8291">Return Attestation</text><text fill="#000000" font-family="Helvetica" font-size="10" x="102.0273" y="889.4697">(Quote, EventLog, CertChain)</text><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="102.5" y1="931.1094" y2="931.1094"/><line style="stroke:#181818;stroke-width:1;" x1="102.5" x2="102.5" y1="931.1094" y2="944.1094"/><line style="stroke:#181818;stroke-width:1;" x1="61.5" x2="102.5" y1="944.1094" y2="944.1094"/><polygon fill="#181818" points="71.5,940.1094,61.5,944.1094,71.5,948.1094,67.5,944.1094" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="920.9307">(16)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="915.1104">Create client_statement</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="926.751">with posture-tpm</text><path d="M224.6035,906.8281 L224.6035,985.8281 L433.6035,985.8281 L433.6035,916.8281 L423.6035,906.8281 L224.6035,906.8281" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M423.6035,906.8281 L423.6035,916.8281 L433.6035,916.8281 L423.6035,906.8281" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="230.6035" y="921.1104">client_statement includes:</text><text fill="#000000" font-family="Helvetica" font-size="10" x="230.6035" y="932.751">- sub</text><text fill="#000000" font-family="Helvetica" font-size="10" x="230.6035" y="944.3916">- product_id</text><text fill="#000000" font-family="Helvetica" font-size="10" x="230.6035" y="956.0322">- product_version</text><text fill="#000000" font-family="Helvetica" font-size="10" x="230.6035" y="967.6729">- posture (containing TPM Quote etc.)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="230.6035" y="979.3135">- attestation-info</text><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="102.5" y1="1009.3125" y2="1009.3125"/><line style="stroke:#181818;stroke-width:1;" x1="102.5" x2="102.5" y1="1009.3125" y2="1022.3125"/><line style="stroke:#181818;stroke-width:1;" x1="61.5" x2="102.5" y1="1022.3125" y2="1022.3125"/><polygon fill="#181818" points="71.5,1018.3125,61.5,1022.3125,71.5,1026.3125,67.5,1022.3125" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="1004.9541">(17)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="1004.9541">Create Client Assertion JWT</text><path d="M241.5859,996.6719 L241.5859,1145.6719 L543.5859,1145.6719 L543.5859,1006.6719 L533.5859,996.6719 L241.5859,996.6719" fill="#ADD8E6" style="stroke:#181818;stroke-width:0.5;"/><path d="M533.5859,996.6719 L533.5859,1006.6719 L543.5859,1006.6719 L533.5859,996.6719" fill="#ADD8E6" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="247.5859" y="1010.9541">Client Assertion JWT Claims (with Attestation):</text><text fill="#000000" font-family="Helvetica" font-size="10" x="247.5859" y="1022.5947">{</text><text fill="#000000" font-family="Helvetica" font-size="10" x="253.9434" y="1034.2354">"iss": "&lt;client_id&gt;", "sub": "&lt;client_id&gt;",</text><text fill="#000000" font-family="Helvetica" font-size="10" x="253.9434" y="1045.876">"aud": "&lt;AS_Token_Endpoint_URL&gt;",</text><text fill="#000000" font-family="Helvetica" font-size="10" x="253.9434" y="1057.5166">"exp": ..., "jti": "...",</text><text fill="#000000" font-family="Helvetica" font-size="10" x="253.9434" y="1069.1572">// Embed the client_statement with attestation</text><text fill="#000000" font-family="Helvetica" font-size="10" x="253.9434" y="1080.7979">"urn:gematik:params:oauth:client-attestation:tpm2": {</text><text fill="#000000" font-family="Helvetica" font-size="10" x="263.4795" y="1092.4385">"attestation_data": "&lt;Base64(client_statement)&gt;",</text><text fill="#000000" font-family="Helvetica" font-size="10" x="263.4795" y="1104.0791">"client_statement_format": "client-statement"</text><text fill="#000000" font-family="Helvetica" font-size="10" x="257.1221" y="1115.7197">}</text><text fill="#000000" font-family="Helvetica" font-size="10" x="247.5859" y="1127.3604">}</text><text fill="#000000" font-family="Helvetica" font-size="10" x="247.5859" y="1139.001">(sig by Client_Instance_Private_Key)</text><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="102.5" y1="1210.2813" y2="1210.2813"/><line style="stroke:#181818;stroke-width:1;" x1="102.5" x2="102.5" y1="1210.2813" y2="1223.2813"/><line style="stroke:#181818;stroke-width:1;" x1="61.5" x2="102.5" y1="1223.2813" y2="1223.2813"/><polygon fill="#181818" points="71.5,1219.2813,61.5,1223.2813,71.5,1227.2813,67.5,1223.2813" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="1200.1025">(18)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="1194.2822">Create client_statement</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="1205.9229">with posture-software</text><path d="M224.6035,1186 L224.6035,1265 L486.6035,1265 L486.6035,1196 L476.6035,1186 L224.6035,1186" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M476.6035,1186 L476.6035,1196 L486.6035,1196 L476.6035,1186" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="230.6035" y="1200.2822">client_statement includes:</text><text fill="#000000" font-family="Helvetica" font-size="10" x="