<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="SEQUENCE" height="3332px" preserveAspectRatio="none" style="width:1257px;height:3332px;background:#FFFFFF;" version="1.1" viewBox="0 0 1257 3332" width="1257px" zoomAndPan="magnify"><defs/><g><rect fill="#F8F8FF" height="3320.1563" style="stroke:#181818;stroke-width:0.5;" width="782.5088" x="11" y="6"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="393.7925" y="15.2822">LEI</text><rect fill="#E6E6FA" height="3303.5156" style="stroke:#181818;stroke-width:0.5;" width="586.771" x="11" y="22.6406"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="265.2888" y="31.9229">Prim&#228;rsystem</text><rect fill="#F4A460" height="3286.875" style="stroke:#181818;stroke-width:0.5;" width="89" x="11" y="39.2813"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="23" y="48.5635">ZETA Client</text><rect fill="#C9FFC9" height="3320.1563" style="stroke:#181818;stroke-width:0.5;" width="446.2119" x="805.5088" y="6"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="1004.2544" y="15.2822">Anbieter</text><rect fill="#F4A460" height="3303.5156" style="stroke:#181818;stroke-width:0.5;" width="446.2119" x="805.5088" y="22.6406"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="995.4702" y="31.9229">ZETA Guard</text><g><title>ZETA</title><rect fill="#000000" fill-opacity="0.00000" height="3188.6719" width="8" x="52" y="93.2031"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="55.5" x2="55.5" y1="93.2031" y2="3281.875"/></g><g><title/><rect fill="#FFFFFF" height="3175.6719" style="stroke:#181818;stroke-width:1;" width="10" x="50.5" y="101.2031"/></g><g><title>ZETA Attestation Service</title><rect fill="#000000" fill-opacity="0.00000" height="3188.6719" width="8" x="332.2852" y="93.2031"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="335.7852" x2="335.7852" y1="93.2031" y2="3281.875"/></g><g><title/><rect fill="#FFFFFF" height="551.5781" style="stroke:#181818;stroke-width:1;" width="10" x="330.7852" y="342.25"/></g><g><title>TPM</title><rect fill="#000000" fill-opacity="0.00000" height="3188.6719" width="8" x="572.8877" y="93.2031"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="576.3877" x2="576.3877" y1="93.2031" y2="3281.875"/></g><g><title/><rect fill="#FFFFFF" height="306.9688" style="stroke:#181818;stroke-width:1;" width="10" x="571.3877" y="483.0156"/></g><g><title>Konnektor or</title><rect fill="#000000" fill-opacity="0.00000" height="3188.6719" width="8" x="649.6978" y="93.2031"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="653.1978" x2="653.1978" y1="93.2031" y2="3281.875"/></g><g><title/><rect fill="#FFFFFF" height="76.9219" style="stroke:#181818;stroke-width:1;" width="10" x="648.1978" y="1668.4219"/></g><g><title>SM.C.-B</title><rect fill="#000000" fill-opacity="0.00000" height="3188.6719" width="8" x="758.894" y="93.2031"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="762.394" x2="762.394" y1="93.2031" y2="3281.875"/></g><g><title/><rect fill="#FFFFFF" height="25.6406" style="stroke:#181818;stroke-width:1;" width="10" x="757.394" y="1694.0625"/></g><g><title>PDP</title><rect fill="#000000" fill-opacity="0.00000" height="3188.6719" width="8" x="864.4834" y="93.2031"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="867.9834" x2="867.9834" y1="93.2031" y2="3281.875"/></g><g><title/><rect fill="#FFFFFF" height="25.6406" style="stroke:#181818;stroke-width:1;" width="10" x="862.9834" y="118.8438"/></g><g><title/><rect fill="#FFFFFF" height="1280.5625" style="stroke:#181818;stroke-width:1;" width="10" x="862.9834" y="1969.3125"/></g><g><title>PDP</title><rect fill="#000000" fill-opacity="0.00000" height="3188.6719" width="8" x="1122.791" y="93.2031"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="1126.291" x2="1126.291" y1="93.2031" y2="3281.875"/></g><g><title/><rect fill="#FFFFFF" height="25.6406" style="stroke:#181818;stroke-width:1;" width="10" x="1121.291" y="2567.4531"/></g><g><title/><rect fill="#FFFFFF" height="25.6406" style="stroke:#181818;stroke-width:1;" width="10" x="1121.291" y="2960.9063"/></g><g><title>PDP</title><rect fill="#000000" fill-opacity="0.00000" height="3188.6719" width="8" x="1203.9346" y="93.2031"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5,5;" x1="1207.4346" x2="1207.4346" y1="93.2031" y2="3281.875"/></g><g><title/><rect fill="#FFFFFF" height="162.0469" style="stroke:#181818;stroke-width:1;" width="10" x="1202.4346" y="2672.0156"/></g><rect fill="#E2E2F0" height="37.2813" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="42.9502" x="34.0249" y="54.9219"/><text fill="#000000" font-family="Helvetica" font-size="10" x="42.4409" y="71.2041">ZETA</text><text fill="#000000" font-family="Helvetica" font-size="10" x="41.0249" y="82.8447">Client</text><rect fill="#E2E2F0" height="37.2813" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="138.6826" x="266.4438" y="54.9219"/><text fill="#000000" font-family="Helvetica" font-size="10" x="273.4438" y="71.2041">ZETA Attestation Service</text><text fill="#000000" font-family="Helvetica" font-size="10" x="299.9185" y="82.8447">(Admin rights)</text><rect fill="#E2E2F0" height="25.6406" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="34.7666" x="559.0044" y="66.5625"/><text fill="#000000" font-family="Helvetica" font-size="10" x="566.0044" y="82.8447">TPM</text><rect fill="#E2E2F0" height="37.2813" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="78.8535" x="613.771" y="54.9219"/><text fill="#000000" font-family="Helvetica" font-size="10" x="620.771" y="71.2041">Konnektor or</te