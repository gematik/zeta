oints="1045.8223,114.8438,1055.8223,118.8438,1045.8223,122.8438,1049.8223,118.8438" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="1051.8223" y1="118.8438" y2="118.8438"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="114.4854">(01)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="114.4854">GET /nonce</text><polygon fill="#181818" points="71.5,140.4844,61.5,144.4844,71.5,148.4844,67.5,144.4844" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="65.5" x2="1056.8223" y1="144.4844" y2="144.4844"/><text fill="#000000" font-family="Helvetica" font-size="10" x="77.5" y="140.126">(02)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="102.0273" y="140.126">return 200 OK new-nonce: nonce</text><path d="M20.5,156.4844 L80.4561,156.4844 L80.4561,160.125 L70.4561,170.125 L20.5,170.125 L20.5,156.4844" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="1528" style="stroke:#000000;stroke-width:1.5;" width="1321.6299" x="20.5" y="156.4844"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="35.5" y="166.7666">alt</text><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="95.4561" y="167.7666">[Initial SM(C)-B Token Exchangewith Attestation]</text><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="20.5" x2="1342.1299" y1="1422.7188" y2="1422.7188"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="25.5" y="1434.001">[Refresh Token use (without Attestation)]</text><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="102.5" y1="197.7656" y2="197.7656"/><line style="stroke:#181818;stroke-width:1;" x1="102.5" x2="102.5" y1="197.7656" y2="210.7656"/><line style="stroke:#181818;stroke-width:1;" x1="61.5" x2="102.5" y1="210.7656" y2="210.7656"/><polygon fill="#181818" points="71.5,206.7656,61.5,210.7656,71.5,214.7656,67.5,210.7656" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="193.4072">(03)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="193.4072">Create DPoP Key Pair (for Token Exchange)</text><path d="M321.2002,185.125 L321.2002,206.125 L547.2002,206.125 L547.2002,195.125 L537.2002,185.125 L321.2002,185.125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M537.2002,185.125 L537.2002,195.125 L547.2002,195.125 L537.2002,185.125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="327.2002" y="199.4072">Session-based Key Pair for DPoP binding.</text><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="102.5" y1="236.4063" y2="236.4063"/><line style="stroke:#181818;stroke-width:1;" x1="102.5" x2="102.5" y1="236.4063" y2="249.4063"/><line style="stroke:#181818;stroke-width:1;" x1="61.5" x2="102.5" y1="249.4063" y2="249.4063"/><polygon fill="#181818" points="71.5,245.4063,61.5,249.4063,71.5,253.4063,67.5,249.4063" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="232.0479">(04)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="232.0479">Calculate attestation_challenge</text><path d="M261.957,223.7656 L261.957,279.7656 L649.957,279.7656 L649.957,233.7656 L639.957,223.7656 L261.957,223.7656" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M639.957,223.7656 L639.957,233.7656 L649.957,233.7656 L639.957,223.7656" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="267.957" y="238.0479">The attestation_challenge is a cryptographic hash</text><text fill="#000000" font-family="Helvetica" font-size="10" x="267.957" y="249.6885">of the PuK.Client.Sig and a nonce.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="267.957" y="261.3291">It is used to bind the attestation to the client instance.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="267.957" y="272.9697">attestation_challenge = HASH(JWK Thumbprint ofPuK.Client.Sig + nonce)</text><path d="M39.5,289.3281 L99.4561,289.3281 L99.4561,292.9688 L89.4561,302.9688 L39.5,302.9688 L39.5,289.3281" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="802.3438" style="stroke:#000000;stroke-width:1.5;" width="1002.7354" x="39.5" y="289.3281"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="54.5" y="299.6104">alt</text><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="114.4561" y="300.6104">[ZETA Attestation Service available]</text><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="39.5" x2="1042.2354" y1="984.1094" y2="984.1094"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="44.5" y="995.3916">[Fallback: Software-basierte Attestierung]</text><polygon fill="#181818" points="513.624,338.25,523.624,342.25,513.624,346.25,517.624,342.25" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="519.624" y1="342.25" y2="342.25"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="332.0713">(05)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="326.251">Get Attestation</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="337.8916">with `attestation_challenge`</text><path d="M540.624,317.9688 L540.624,420.9688 L910.624,420.9688 L910.624,327.9688 L900.624,317.9688 L540.624,317.9688" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M900.624,317.9688 L900.624,327.9688 L910.624,327.9688 L900.624,317.9688" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="546.624" y="332.251">The Prim&#228;rsystem (PS) and the ZETA Attestation Service (ZTA) are</text><text fill="#000000" font-family="Helvetica" font-size="10" x="546.624" y="343.8916">in the same trust domain. At the time of client installation, the ZTA</text><text fill="#000000" font-family="Helvetica" font-size="10" x="546.624" y="355.5322">computes a cryptographic hash of the PS software and extends this</text><text fill="#000000" font-family="Helvetica" font-size="10" x="546.624" y="367.1729">hash into a specific PCR (22 or 23) using TPM2_PCR_Extend. The</text><text fill="#000000" font-family="Helvetica" font-size="10" x="546.624" y="378.8135">ZTA reads and stores the resulting PCR value as a reference</text><text fill="#000000" font-family="Helvetica" font-size="10" x="546.624" y="390.4541">measurement or baseline. At every start of the PS, the ZTA measures</text><text fill="#000000" font-family="Helvetica" font-size="10" x="546.624" y="402.0947">the PS software and extends the resulting hash into the same PCR</text><text fill="#000000" font-family="Helvetica" font-size="10" x="546.624" y="413.7354">(22 or 23) using TPM2_PCR_Extend.</text><path d="M514.624,430.0938 L574.5801,430.0938 L574.5801,433.7344 L564.5801,443.7344 L514.624,443.7344 L514.624,430.0938" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="199.7656" style="stroke:#000000;stroke-width:1.5;" width="361.5029" x="514.624" y="430.0938"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="529.624" y="440.376">alt</text><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="589.5801" y="441.376">[ZETA TPM Service has no TPM Attestation Key]</text><polygon fill="#181818" points="754.2266,479.0156,764.2266,483.0156,754.2266,487.0156,758.2266,483.0156" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="535.624" x2="760.2266" y1="483.0156" y2="483.0156"/><text fill="#000000" font-family="Helvetica" font-size="10" x="542.624" y="472.8369">(06)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="467.0166">Generate Attestation Key Pair (AK)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="478.6572">and Get AK Handle</text><polygon fill="#181818" points="546.624,516.2969,536.624,520.2969,546.624,524.2969,542.624,520.2969" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="540.624" x2="765.2266" y1="520.2969" y2="520.2969"/><text fill="#000000" font-family="Helvetica" font-size="10" x="552.624" y="510.1182">(07)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="577.1514" y="504.2979">Return Attestation Public Key</text><text fill="#000000" font-family="Helvetica" font-size="10" x="577.1514" y="515.9385">and AK Handle</text><polygon fill="#181818" points="754.2266,541.9375,764.2266,545.9375,754.2266,549.9375,758.2266,545.9375" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="535.624" x2="760.2266" y1="545.9375" y2="545.9375"/><text fill="#000000" font-family="Helvetica" font-size="10" x="542.624" y="541.5791">(08)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="541.5791">Get Certificate Chain</text><polygon fill="#181818" points="546.624,567.5781,536.624,571.5781,546.624,575.5781,542.624,571.5781" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="540.624" x2="765.2266" y1="571.5781" y2="571.5781"/><text fill="#000000" font-family="Helvetica" font-size="10" x="552.624" y="567.2197">(09)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="577.1514" y="567.2197">Return Certificate Chain</text><line style="stroke:#181818;stroke-width:1;" x1="535.624" x2="577.624" y1="608.8594" y2="608.8594"/><line style="stroke:#181818;stroke-width:1;" x1="577.624" x2="577.624" y1="608.8594" y2="621.8594"/><line style="stroke:#181818;stroke-width:1;" x1="536.624" x2="577.624" y1="621.8594" y2="621.8594"/><polygon fill="#181818" points="546.624,617.8594,536.624,621.8594,546.624,625.8594,542.624,621.8594" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="542.624" y="598.6807">(10)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="592.8604">Store AK Handle, AK Public Key</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="604.501">and Certificate Chain</text><line style="stroke:#181818;stroke-width:1;" x1="535.624" x2="577.624" y1="661.5" y2="661.5"/><line style="stroke:#181818;stroke-width:1;" x1="577.624" x2="577.624" y1="661.5" y2="674.5"/><line style="stroke:#181818;stroke-width:1;" x1="536.624" x2="577.624" y1="674.5" y2="674.5"/><polygon fill="#181818" points="546.624,670.5,536.624,674.5,546.624,678.5,542.624,674.5" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="542.624" y="657.1416">(11)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="657.1416">Select AK Handle</text><polygon fill="#181818" points="754.2266,742.7031,764.2266,746.7031,754.2266,750.7031,758.2266,746.7031" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="535.624" x2="760.2266" y1="746.7031" y2="746.7031"/><text fill="#000000" font-family="Helvetica" font-size="10" x="542.624" y="719.0635">(12)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="695.7822">Get TPM Quote for PCRs</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="707.4229">(7, 22 or 23)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="719.0635">and `attestation_challenge`</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="730.7041">(as qualifyingData),</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="742.3447">signed with AK</text><path d="M256.5137,687.5 L256.5137,720.5 L525.5137,720.5 L525.5137,697.5 L515.5137,687.5 L256.5137,687.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M515.5137,687.5 L515.5137,697.5 L525.5137,697.5 L515.5137,687.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="262.5137" y="701.7822">Binding: `attestation_challenge`.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="262.5137" y="713.4229">Das TPM signiert PCRs + `attestation_challenge`.</text><path d="M781.2266,687.5 L781.2266,720.5 L1021.2266,720.5 L1021.2266,697.5 L1011.2266,687.5 L781.2266,687.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1011.2266,687.5 L1011.2266,697.5 L1021.2266,697.5 L1011.2266,687.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="787.2266" y="701.7822">PCR 7: Secure Boot State / Policy, Digest</text><text fill="#000000" font-family="Helvetica" font-size="10" x="787.2266" y="713.4229">PCR 22 or 23 (if available) App Data, Digest</text><polygon fill="#181818" points="546.624,768.3438,536.624,772.3438,546.624,776.3438,542.624,772.3438" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="540.624" x2="765.2266" y1="772.3438" y2="772.3438"/><text fill="#000000" font-family="Helvetica" font-size="10" x="552.624" y="767.9854">(13)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="577.1514" y="767.9854">Return TPM Quote</text><line style="stroke:#181818;stroke-width:1;" x1="535.624" x2="577.624" y1="797.9844" y2="797.9844"/><line style="stroke:#181818;stroke-width:1;" x1="577.624" x2="577.624" y1="797.9844" y2="810.9844"/><line style="stroke:#181818;stroke-width:1;" x1="536.624" x2="577.624" y1="810.9844" y2="810.9844"/><polygon fill="#181818" points="546.624,806.9844,536.624,810.9844,546.624,814.9844,542.624,810.9844" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="542.624" y="793.626">(14)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="567.1514" y="793.626">Get TCG Event Log (from OS/Firmware)</text><path d="M776.2266,785.3438 L776.2266,841.3438 L1020.2266,841.3438 L1020.2266,795.3438 L1010.2266,785.3438 L776.2266,785.3438" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1010.2266,785.3438 L1010.2266,795.3438 L1020.2266,795.3438 L1010.2266,785.3438" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="782.2266" y="799.626">Quote contains:</text><text fill="#000000" font-family="Helvetica" font-size="10" x="782.2266" y="811.2666">- `attestation_challenge` (as qualifyingData)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="782.2266" y="822.9072">- Attested Data (PCR Select, PCR Digest),</text><text fill="#000000" font-family="Helvetica" font-size="10" x="782.2266" y="834.5479">- Signature</text><polygon fill="#181818" points="71.5,872.1875,61.5,876.1875,71.5,880.1875,67.5,876.1875" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="65.5" x2="524.624" y1="876.1875" y2="876.1875"/><text fill="#000000" font-family="Helvetica" font-size="10" x="77.5" y="866.0088">(15)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="102.0273" y="860.1885">Return Attestation</text><text fill="#000000" font-family="Helvetica" font-size="10" x="102.0273" y="871.8291">(Quote, EventLog, CertChain)</text><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="102.5" y1="913.4688" y2="913.4688"/><line style="stroke:#181818;stroke-width:1;" x1="102.5" x2="102.5" y1="913.4688" y2="926.4688"/><line style="stroke:#181818;stroke-width:1;" x1="61.5" x2="102.5" y1="926.4688" y2="926.4688"/><polygon fill="#181818" points="71.5,922.4688,61.5,926.4688,71.5,930.4688,67.5,926.4688" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="903.29">(16)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="897.4697">Create client_statement</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="909.1104">with posture-tpm</text><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="102.5" y1="952.1094" y2="952.1094"/><line style="stroke:#181818;stroke-width:1;" x1="102.5" x2="102.5" y1="952.1094" y2="965.1094"/><line style="stroke:#181818;stroke-width:1;" x1="61.5" x2="102.5" y1="965.1094" y2="965.1094"/><polygon fill="#181818" points="71.5,961.1094,61.5,965.1094,71.5,969.1094,67.5,965.1094" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="947.751">(17)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="947.751">Create Client Assertion JWT (with TPM Attestation, sig by Client_Instance_Private_Key)</text><line style="stroke:#181818;stroke-width:1;" x1="60.5" x2="102.5" y1="1032.0313" y2="1032.0313"/><line style="stroke:#181818;stroke-width:1;" x1="102.5" x2="102.5" y1="1032.0313" y2="1045.0313"/><line style="stroke:#181818;stroke-width:1;" x1="61.5" x2="102.5" y1="1045.0313" y2="1045.0313"/><polygon fill="#181818" points="71.5,1041.0313,61.5,1045.0313,71.5,1049.0313,67.5,1045.0313" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="67.5" y="1021.8525">(18)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="1016.0322">Create client_statement</text><text fill="#000000" font-family="Helvetica" font-size="10" x="92.0273" y="1027.6729">with posture-software</text><line style="stroke:#1818