1,144.5625 L947.5601,144.5625 L937.5601,134.5625" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" x="206.5601" y="148.8447">Vorbedingungen:</text><text fill="#000000" font-family="Helvetica" font-size="10" x="206.5601" y="160.4854">- Service Discovery ist abgeschlossen (Abb-ZETA-Service-Discovery), der ZETA Client kennt die Endpunkte des PDP Authorization Server.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="206.5601" y="172.126">- Der ZETA Client wurde per Dynamic Client Registration registriert (Abb-ZETA-DCR-f&#252;r-mobile-Clients) und besitzt PrK.Client.Sig / PuK.Client.Sig.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="206.5601" y="183.7666">- Der PDP Authorization Server ist als Relying Party (Fachdienst) beim Federation Master registriert.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="206.5601" y="195.4072">- App-Link / Universal-Link f&#252;r ZETA Client und Authenticator-Modul sind im Betriebssystem registriert.</text><polygon fill="#181818" points="245.625,233.0469,255.625,237.0469,245.625,241.0469,249.625,237.0469" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="42.5898" x2="251.625" y1="237.0469" y2="237.0469"/><text fill="#000000" font-family="Helvetica" font-size="10" x="49.5898" y="221.0479">W&#228;hlt sektoralen IDP (idp_iss)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="49.5898" y="232.6885">und startet Zugriff auf den Fachdienst</text><line style="stroke:#181818;stroke-width:1;" x1="267.625" x2="309.625" y1="285.9688" y2="285.9688"/><line style="stroke:#181818;stroke-width:1;" x1="309.625" x2="309.625" y1="285.9688" y2="298.9688"/><line style="stroke:#181818;stroke-width:1;" x1="268.625" x2="309.625" y1="298.9688" y2="298.9688"/><polygon fill="#181818" points="278.625,294.9688,268.625,298.9688,278.625,302.9688,274.625,298.9688" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="274.625" y="258.3291">Erstellt vollst&#228;ndigen</text><text fill="#000000" font-family="Helvetica" font-size="10" x="274.625" y="269.9697">fachlichen HTTPS-Request</text><text fill="#000000" font-family="Helvetica" font-size="10" x="274.625" y="281.6104">(inkl. Header)</text><polygon fill="#181818" points="444.1465,332.25,454.1465,336.25,444.1465,340.25,448.1465,336.25" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="267.625" x2="450.1465" y1="336.25" y2="336.25"/><text fill="#000000" font-family="Helvetica" font-size="10" x="274.625" y="320.251">Beauftragt Verarbeitung des</text><text fill="#000000" font-family="Helvetica" font-size="10" x="274.625" y="331.8916">fachlichen Requests (inkl. idp_iss)</text><path d="M377.8335,349.25 L377.8335,370.25 L968.8335,370.25 L968.8335,359.25 L958.8335,349.25 L377.8335,349.25" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M958.8335,349.25 L958.8335,359.25 L968.8335,359.25 L958.8335,349.25" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="383.8335" y="363.5322">Der ZETA Client ben&#246;tigt f&#252;r den Zugriff ein g&#252;ltiges Access Token und f&#252;hrt dazu die OIDC-Authentifizierung aus.</text><rect fill="#FFFFFF" height="51.9063" style="stroke:#000000;stroke-width:1.5;" width="804.0889" x="427.0229" y="375.8906"/><path d="M427.0229,375.8906 L491.0229,375.8906 L491.0229,380.8906 L481.0229,390.8906 L427.0229,390.8906 L427.0229,375.8906" fill="#EEEEEE" style="stroke:#000000;stroke-width:2;"/><text fill="#000000" font-family="Helvetica" font-size="12" font-weight="bold" x="440.0229" y="389.0293">ref</text><text fill="#000000" font-family="Helvetica" font-size="12" font-weight="bold" x="724.7266" y="406.0293">(A)</text><text fill="#000000" font-family="Helvetica" font-size="12" x="748.7969" y="406.0