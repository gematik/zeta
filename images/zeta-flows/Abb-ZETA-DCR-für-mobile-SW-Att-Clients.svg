0000" height="552.2188" width="8" x="746.916" y="114.9219"/><line style="stroke:#000000;stroke-width:0.5;stroke-dasharray:5,5;" x1="750.416" x2="750.416" y1="114.9219" y2="667.1406"/></g><g><title/><rect fill="#FFFFFF" height="299.8906" style="stroke:#181818;stroke-width:1;" width="10" x="745.416" y="222.0469"/></g><g><title/><rect fill="#FFFFFF" height="64.2813" style="stroke:#181818;stroke-width:1;" width="10" x="745.416" y="584.8594"/></g><text fill="#000000" font-family="Helvetica" font-size="10" x="10" y="112.5635">Nutzer</text><ellipse cx="29.626" cy="51.7813" fill="#E2E2F0" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M29.626,59.7813 L29.626,86.7813 M16.626,67.7813 L42.626,67.7813 M29.626,86.7813 L16.626,101.7813 M29.626,86.7813 L42.626,101.7813" fill="none" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#FFE6CC" height="25.6406" rx="2.5" ry="2.5" style="stroke:#D79B00;stroke-width:0.5;" width="72.2471" x="202.7378" y="88.2813"/><text fill="#000000" font-family="Helvetica" font-size="10" x="209.7378" y="104.5635">ZETA Client</text><rect fill="#FFE6CC" height="37.2813" rx="2.5" ry="2.5" style="stroke:#D79B00;stroke-width:0.5;" width="116.9492" x="691.9414" y="76.6406"/><text fill="#000000" font-family="Helvetica" font-size="10" x="740.5356" y="92.9229">PDP</text><text fill="#000000" font-family="Helvetica" font-size="10" x="698.9414" y="104.5635">Authorization Server</text><text fill="#000000" font-family="Helvetica" font-size="10" x="10" y="736.4229">Nutzer</text><ellipse cx="29.626" cy="675.6406" fill="#E2E2F0" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M29.626,683.6406 L29.626,710.6406 M16.626,691.6406 L42.626,691.6406 M29.626,710.6406 L16.626,725.6406 M29.626,710.6406 L42.626,725.6406" fill="none" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#FFE6CC" height="25.6406" rx="2.5" ry="2.5" style="stroke:#D79B00;stroke-width:0.5;" width="72.2471" x="202.7378" y="667.1406"/><text fill="#000000" font-family="Helvetica" font-size="10" x="209.7378" y="683.4229">ZETA Client</text><rect fill="#FFE6CC" height="37.2813" rx="2.5" ry="2.5" style="stroke:#D79B00;stroke-width:0.5;" width="116.9492" x="691.9414" y="667.1406"/><text fill="#000000" font-family="Helvetica" font-size="10" x="740.5356" y="683.4229">PDP</text><text fill="#000000" font-family="Helvetica" font-size="10" x="698.9414" y="695.0635">Authorization Server</text><polygon fill="#181818" points="733.416,218.0469,743.416,222.0469,733.416,226.0469,737.416,222.0469" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="243.8613" x2="739.416" y1="222.0469" y2="222.0469"/><text fill="#000000" font-family="Helvetica" font-size="10" x="250.8613" y="176.9463">(01)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="136.2041">POST /register</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="147.8447">{</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="159.4854">"client_name": "myClient",</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="171.126">"grant_types": ["urn:ietf:params:oauth:grant-type:token-exchange", "refresh_token"],</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="182.7666">"jwks": { "keys": [ PuK.Client.Sig ] },</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="194.4072">"token_endpoint_auth_method": "private_key_jwt",</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="206.0479">"redirect_uris": ["https:</text><text fill="#000000" font-family="Helvetica" font-size="10" font-style="italic" x="397.6104" y="206.0479">&lt;App-FQDN&gt;/cb/&lt;app&gt;/as", "https:</text><text fill="#000000" font-family="Helvetica" font-size="10" x="579.8516" y="206.0479">&lt;App-FQDN&gt;/cb/&lt;app&gt;/app"]</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="217.6885">}</text><path d="M760.416,235.0469 L760.416,384.0469 L1204.416,384.0469 L1204.416,245.0469 L1194.416,235.0469 L760.416,235.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1194.416,235.0469 L1194.416,245.0469 L1204.416,245.0469 L1194.416,235.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="766.416" y="249.3291">Es werden zwei redirect_uris je App registriert (RFC 8252, claimed-HTTPS</text><text fill="#000000" font-family="Helvetica" font-size="10" x="766.416" y="260.9697">Universal-/App-Links auf einer vom App-Hersteller kontrollierten Domain):</text><text fill="#000000" font-family="Helvetica" font-size="10" x="766.416" y="272.6104">- https://&lt;App-FQDN&gt;/cb/&lt;app&gt;/as = redirect_uri_as</text><text fill="#000000" font-family="Helvetica" font-size="10" x="772.7734" y="284.251">(SekIDP Auth Code Flow, redirection_endpoint des AuthS, nicht /token)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="766.416" y="295.8916">- https://&lt;App-FQDN&gt;/cb/&lt;app&gt;/app = redirect_uri_app</text><text fill="#000000" font-family="Helvetica" font-size="10" x="772.7734" y="307.5322">(ZETA Guard Auth Code Flow, /token-Endpunkt des AuthS)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="766.416" y="319.1729">Beide Callbacks enden &#252;ber denselben App-Link/Universal-Link in der App;</text><text fill="#000000" font-family="Helvetica" font-size="10" x="766.416" y="330.8135">der ZETA Client unterscheidet den zu nutzenden AuthS-Endpunkt anhand des Pfads.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="766.416" y="342.4541">Die OS-seitige Verkn&#252;pfung erfolgt &#252;ber apple-app-site-association bzw.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="766.416" y="354.0947">assetlinks.json (Deployment, kein Laufzeit-Flow). Die App ist inkl. redirect_uris</text><text fill="#000000" font-family="Helvetica" font-size="10" x="766.416" y="365.7354">bei der gematik registriert; der AuthS pr&#252;ft beim DCR, ob die &#252;bergebenen</text><text fill="#000000" font-family="Helvetica" font-size="10" x="766.416" y="377.376">redirect_uris registriert sind.</text><line style="stroke:#181818;stroke-width:1;" x1="755.416" x2="797.416" y1="407.375" y2="407.375"/><line style="stroke:#181818;stroke-width:1;" x1="797.416" x2="797.416" y1="407.375" y2="420.375"/><line style="stroke:#181818;stroke-width:1;" x1="756.416" x2="797.416" y1="420.375" y2="420.375"/><polygon fill="#181818" points="766.416,416.375,756.416,420.375,766.416,424.375,762.416,420.375" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="762.416" y="403.0166">(02)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="786.9434" y="403.0166">Store Client Placeholder (state: pending_user_binding)</text><line style="stroke:#181818;stroke-width:1;" x1="755.416" x2="797.416" y1="457.6563" y2="457.6563"/><line style="stroke:#181818;stroke-width:1;" x1="797.416" x2="797.416" y1="457.6563" y2="470.6563"/><line style="stroke:#181818;stroke-width:1;" x1="756.416" x2="797.416" y1="470.6563" y2="470.6563"/><polygon fill="#181818" points="766.416,466.6563,756.416,470.6563,766.416,474.6563,762.416,470.6563" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="762.416" y="447.4775">(03)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="786.9434" y="441.6572">Generiere OTP &amp; transaction_id</text><text fill="#000000" font-family="Helvetica" font-size="10" x="786.9434" y="453.2979">Speichere Request im tempor&#228;ren Cache</text><polygon fill="#181818" points="40.626,492.2969,30.626,496.2969,40.626,500.2969,36.626,496.2969" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="34.626" x2="744.416" y1="496.2969" y2="496.2969"/><text fill="#000000" font-family="Helvetica" font-size="10" x="46.626" y="491.9385">(04)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="71.1533" y="491.9385">E-Mail mit OTP-Best&#228;tigungscode (Out-of-Band)</text><polygon fill="#181818" points="254.8613,517.9375,244.8613,521.9375,254.8613,525.9375,250.8613,521.9375" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="248.8613" x2="744.416" y1="521.9375" y2="521.9375"/><text fill="#000000" font-family="Helvetica" font-size="10" x="260.8613" y="517.5791">(05)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="285.3887" y="517.5791">202 Accepted {transaction_id, message="OTP sent"}</text><polygon fill="#181818" points="221.8613,543.5781,231.8613,547.5781,221.8613,551.5781,225.8613,547.5781" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="29.626" x2="227.8613" y1="547.5781" y2="547.5781"/><text fill="#000000" font-family="Helvetica" font-size="10" x="36.626" y="543.2197">(06)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="61.1533" y="543.2197">Gibt OTP-Best&#228;tigungscode ein</text><polygon fill="#181818" points="733.416,580.8594,743.416,584.8594,733.416,588.8594,737.416,584.8594" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="243.8613" x2="739.416" y1="584.8594" y2="584.8594"/><text fill="#000000" font-family="Helvetica" font-size="10" x="250.8613" y="574.6807">(07)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="568.8604">POST /register/verify</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="580.501">{transaction_id, code}</text><line style="stroke:#181818;stroke-width:1;" x1="755.416" x2="797.416" y1="610.5" y2="610.5"/><line style="stroke:#181818;stroke-width:1;" x1="797.416" x2="797.416" y1="610.5" y2="623.5"/><line style="stroke:#181818;stroke-width:1;" x1="756.416" x2="797.416" y1="623.5" y2="623.5"/><polygon fill="#181818" points="766.416,619.5,756.416,623.5,766.416,627.5,762.416,623.5" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="762.416" y="606.1416">(08)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="786.9434" y="606.1416">Verifiziere OTP-Code gegen Cache</text><polygon fill="#181818" points="254.8613,645.1406,244.8613,649.1406,254.8613,653.1406,250.8613,649.1406" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="248.8613" x2="744.416" y1="649.1406" y2="649.1406"/><text fill="#000000" font-family="Helvetica" font-size="10" x="260.8613" y="644.7822">(09)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="285.3887" y="644.7822">201 Created {client_id, status="pending_user_binding"}</text><?plantuml-src XLNHKk9857tdA-xaOHTB0hDMRTLMHgr2G8SQ5HRGhTtLIZN99RGatPdkZWYMVpEVuPi_jhSxW33hE3v8ahvzxhdddhxzWOieBMA4UhsH5rdgfsmX2rCt3wPIOP6H2guqAc0QlCl2B55vbSfOFe2NoJ5F4TfupoFqeDsvxhOwOQjttXjK05n8Cyyzw0-w5ytEOFZtSDIvsAm3v4mP7l6S2GEjb2Fzs2J_T4RDrRi7XuTBDEpuc3QWY2rePVrRacYACKT3_4PTEAX_X3RjqyOcxLrtsvt1BX-7VLOm5NjWdyEpg-QW_GDEpS9CXuvIlzs_4VPLAhvaXai1GrJt9CMx1CiYzlTN3-0VbvZx-m7qUyCHD1GcN1Fx6_5u8m2yo0M6WcNe1QJmOgL3pQqcYcY5Pf6ZfjL_lKA9W8gV1CIQPJgGZD035-NRgC386GeV7w8f4mbwDV0KJXJgQUXMlDiIzsu-iu2FuCrmuQ2XNtofbxdhGvx0BJoLeMvVI1NcaXCNcp3Ca8I9BTzSyNjcC2IOy6w-fgqmvWeZ4nQAbyIdnkGwQ3GEoH_-wP_jo-D6D6uSiZm_RZ1jURuRGQQwlH5F5I4DWkB9r82SbD9I6peQvgXY5B2S8uUTx727G8XGwguuAWFLmMaB_ZZu_Q06KSfuXh7_UJJgMwWhmQd9cgL-m_8uvsAcWH