" font-size="10" x="209.7378" y="578.6572">ZETA Client</text><rect fill="#FFE6CC" height="37.2813" rx="2.5" ry="2.5" style="stroke:#D79B00;stroke-width:0.5;" width="116.9492" x="670.1738" y="562.375"/><text fill="#000000" font-family="Helvetica" font-size="10" x="718.7681" y="578.6572">PDP</text><text fill="#000000" font-family="Helvetica" font-size="10" x="677.1738" y="590.2979">Authorization Server</text><polygon fill="#181818" points="711.6484,218.0469,721.6484,222.0469,711.6484,226.0469,715.6484,222.0469" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="243.8613" x2="717.6484" y1="222.0469" y2="222.0469"/><text fill="#000000" font-family="Helvetica" font-size="10" x="250.8613" y="176.9463">(01)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="136.2041">POST /register</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="147.8447">{</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="159.4854">"client_name": "myClient",</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="171.126">"grant_types": ["urn:ietf:params:oauth:grant-type:token-exchange", "refresh_token"],</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="182.7666">"jwks": { "keys": [ PuK.Client.Sig ] },</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="194.4072">"token_endpoint_auth_method": "private_key_jwt",</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="206.0479">"redirect_uris": ["https://&lt;AuthS-FQDN&gt;/cb/&lt;app-spezifischer-Pfad&gt;"]</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="217.6885">}</text><path d="M738.6484,235.0469 L738.6484,279.0469 L1165.6484,279.0469 L1165.6484,245.0469 L1155.6484,235.0469 L738.6484,235.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1155.6484,235.0469 L1155.6484,245.0469 L1165.6484,245.0469 L1155.6484,235.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="744.6484" y="249.3291">redirect_uris ist je App ein eigener claimed-HTTPS Universal-/App-Link</text><text fill="#000000" font-family="Helvetica" font-size="10" x="744.6484" y="260.9697">auf der AuthS-Domain (RFC 8252). Die OS-seitige Verkn&#252;pfung erfolgt &#252;ber</text><text fill="#000000" font-family="Helvetica" font-size="10" x="744.6484" y="272.6104">apple-app-site-association bzw. assetlinks.json (Deployment, kein Laufzeit-Flow).</text><line style="stroke:#181818;stroke-width:1;" x1="733.6484" x2="775.6484" y1="302.6094" y2="302.6094"/><line style="stroke:#181818;stroke-width:1;" x1="775.6484" x2="775.6484" y1="302.6094" y2="315.6094"/><line style="stroke:#181818;stroke-width:1;" x1="734.6484" x2="775.6484" y1="315.6094" y2="315.6094"/><polygon fill="#181818" points="744.6484,311.6094,734.6484,315.6094,744.6484,319.6094,740.6484,315.6094" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="740.6484" y="298.251">(02)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="765.1758" y="298.251">Store Client Placeholder (state: pending_user_binding)</text><line style="stroke:#181818;stroke-width:1;" x1="733.6484" x2="775.6484" y1="352.8906" y2="352.8906"/><line style="stroke:#181818;stroke-width:1;" x1="775.6484" x2="775.6484" y1="352.8906" y2="365.8906"/><line style="stroke:#181818;stroke-width:1;" x1="734.6484" x2="775.6484" y1="365.8906" y2="365.8906"/><polygon fill="#181818" points="744.6484,361.8906,734.6484,365.8906,744.6484,369.8906,740.6484,365.8906" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="740.6484" y="342.7119">(03)</te