0000" height="552.2188" width="8" x="756.3203" y="114.9219"/><line style="stroke:#000000;stroke-width:0.5;stroke-dasharray:5,5;" x1="759.8203" x2="759.8203" y1="114.9219" y2="667.1406"/></g><g><title/><rect fill="#FFFFFF" height="299.8906" style="stroke:#181818;stroke-width:1;" width="10" x="754.8203" y="222.0469"/></g><g><title/><rect fill="#FFFFFF" height="64.2813" style="stroke:#181818;stroke-width:1;" width="10" x="754.8203" y="584.8594"/></g><text fill="#000000" font-family="Helvetica" font-size="10" x="10" y="112.5635">Nutzer</text><ellipse cx="29.626" cy="51.7813" fill="#E2E2F0" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M29.626,59.7813 L29.626,86.7813 M16.626,67.7813 L42.626,67.7813 M29.626,86.7813 L16.626,101.7813 M29.626,86.7813 L42.626,101.7813" fill="none" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#FFE6CC" height="25.6406" rx="2.5" ry="2.5" style="stroke:#D79B00;stroke-width:0.5;" width="72.2471" x="202.7378" y="88.2813"/><text fill="#000000" font-family="Helvetica" font-size="10" x="209.7378" y="104.5635">ZETA Client</text><rect fill="#FFE6CC" height="37.2813" rx="2.5" ry="2.5" style="stroke:#D79B00;stroke-width:0.5;" width="116.9492" x="701.3457" y="76.6406"/><text fill="#000000" font-family="Helvetica" font-size="10" x="749.9399" y="92.9229">PDP</text><text fill="#000000" font-family="Helvetica" font-size="10" x="708.3457" y="104.5635">Authorization Server</text><text fill="#000000" font-family="Helvetica" font-size="10" x="10" y="736.4229">Nutzer</text><ellipse cx="29.626" cy="675.6406" fill="#E2E2F0" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M29.626,683.6406 L29.626,710.6406 M16.626,691.6406 L42.626,691.6406 M29.626,710.6406 L16.626,725.6406 M29.626,710.6406 L42.626,725.6406" fill="none" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#FFE6CC" height="25.6406" rx="2.5" ry="2.5" style="stroke:#D79B00;stroke-width:0.5;" width="72.2471" x="202.7378" y="667.1406"/><text fill="#000000" font-family="Helvetica" font-size="10" x="209.7378" y="683.4229">ZETA Client</text><rect fill="#FFE6CC" height="37.2813" rx="2.5" ry="2.5" style="stroke:#D79B00;stroke-width:0.5;" width="116.9492" x="701.3457" y="667.1406"/><text fill="#000000" font-family="Helvetica" font-size="10" x="749.9399" y="683.4229">PDP</text><text fill="#000000" font-family="Helvetica" font-size="10" x="708.3457" y="695.0635">Authorization Server</text><polygon fill="#181818" points="742.8203,218.0469,752.8203,222.0469,742.8203,226.0469,746.8203,222.0469" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="243.8613" x2="748.8203" y1="222.0469" y2="222.0469"/><text fill="#000000" font-family="Helvetica" font-size="10" x="250.8613" y="176.9463">(01)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="136.2041">POST /register</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="147.8447">{</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="159.4854">"client_name": "myClient",</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="171.126">"grant_types": ["urn:ietf:params:oauth:grant-type:token-exchange", "refresh_token"],</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="182.7666">"jwks": { "keys": [ PuK.Client.Sig ] },</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="194.4072">"token_endpoint_auth_method": "private_key_jwt",</text><text fill="#000000" font-family="Helvetica" font-size="10" x="281.7461" y="206.0479">"redirect_uris": ["https:</text><text fill="#000000" font-family="Helvetica" font-size="10" font-style="italic" x="397.6104" y="206.0479">&lt;App-FQDN&gt;/cb/&lt;app&gt;/oidc", "https:</text><text fill="#000000" font-family="Helvetica" font-size="10" x="589.2559" y="206.0479">&lt;App-FQDN&gt;/cb/&lt;app&gt;/app"]</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="217.6885">}</text><path d="M769.8203,235.0469 L769.8203,384.0469 L1213.8203,384.0469 L1213.8203,245.0469 L1203.8203,235.0469 L769.8203,235.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1203.8203,235.0469 L1203.8203,245.0469 L1213.8203,245.0469 L1203.8203,235.0469" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="775.8203" y="249.3291">Es werden zwei redirect_uris je App registriert (RFC 8252, claimed-HTTPS</text><text fill="#000000" font-family="Helvetica" font-size="10" x="775.8203" y="260.9697">Universal-/App-Links auf einer vom App-Hersteller kontrollierten Domain):</text><text fill="#000000" font-family="Helvetica" font-size="10" x="775.8203" y="272.6104">- https://&lt;App-FQDN&gt;/cb/&lt;app&gt;/oidc = oidc_redirect_uri</text><text fill="#000000" font-family="Helvetica" font-size="10" x="782.1777" y="284.251">(SekIDP Auth Code Flow, redirection_endpoint des AuthS, nicht /token)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="775.8203" y="295.8916">- https://&lt;App-FQDN&gt;/cb/&lt;app&gt;/app = redirect_uri_app</text><text fill="#000000" font-family="Helvetica" font-size="10" x="782.1777" y="307.5322">(ZETA Guard Auth Code Flow, /token-Endpunkt des AuthS)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="775.8203" y="319.1729">Beide Callbacks enden &#252;ber denselben App-Link/Universal-Link in der App;</text><text fill="#000000" font-family="Helvetica" font-size="10" x="775.8203" y="330.8135">der ZETA Client unterscheidet den zu nutzenden AuthS-Endpunkt anhand des Pfads.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="775.8203" y="342.4541">Die OS-seitige Verkn&#252;pfung erfolgt &#252;ber apple-app-site-association bzw.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="775.8203" y="354.0947">assetlinks.json (Deployment, kein Laufzeit-Flow). Die App ist inkl. redirect_uris</text><text fill="#000000" font-family="Helvetica" font-size="10" x="775.8203" y="365.7354">bei der gematik registriert; der AuthS pr&#252;ft beim DCR, ob die &#252;bergebenen</text><text fill="#000000" font-family="Helvetica" font-size="10" x="775.8203" y="377.376">redirect_uris registriert sind.</text><line style="stroke:#181818;stroke-width:1;" x1="764.8203" x2="806.8203" y1="407.375" y2="407.375"/><line style="stroke:#181818;stroke-width:1;" x1="806.8203" x2="806.8203" y1="407.375" y2="420.375"/><line style="stroke:#181818;stroke-width:1;" x1="765.8203" x2="806.8203" y1="420.375" y2="420.375"/><polygon fill="#181818" points="775.8203,416.375,765.8203,420.375,775.8203,424.375,771.8203,420.375" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="771.8203" y="403.0166">(02)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="796.3477" y="403.0166">Store Client Placeholder (state: pending_user_binding)</text><line style="stroke:#181818;stroke-width:1;" x1="764.8203" x2="806.8203" y1="457.6563" y2="457.6563"/><line style="stroke:#181818;stroke-width:1;" x1="806.8203" x2="806.8203" y1="457.6563" y2="470.6563"/><line style="stroke:#181818;stroke-width:1;" x1="765.8203" x2="806.8203" y1="470.6563" y2="470.6563"/><polygon fill="#181818" points="775.8203,466.6563,765.8203,470.6563,775.8203,474.6563,771.8203,470.6563" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="771.8203" y="447.4775">(03)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="796.3477" y="441.6572">Generiere OTP &amp; transaction_id</text><text fill="#000000" font-family="Helvetica" font-size="10" x="796.3477" y="453.2979">Speichere Request im tempor&#228;ren Cache</text><polygon fill="#181818" points="40.626,492.2969,30.626,496.2969,40.626,500.2969,36.626,496.2969" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="34.626" x2="753.8203" y1="496.2969" y2="496.2969"/><text fill="#000000" font-family="Helvetica" font-size="10" x="46.626" y="491.9385">(04)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="71.1533" y="491.9385">E-Mail mit OTP-Best&#228;tigungscode (Out-of-Band)</text><polygon fill="#181818" points="254.8613,517.9375,244.8613,521.9375,254.8613,525.9375,250.8613,521.9375" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="248.8613" x2="753.8203" y1="521.9375" y2="521.9375"/><text fill="#000000" font-family="Helvetica" font-size="10" x="260.8613" y="517.5791">(05)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="285.3887" y="517.5791">202 Accepted {transaction_id, message="OTP sent"}</text><polygon fill="#181818" points="221.8613,543.5781,231.8613,547.5781,221.8613,551.5781,225.8613,547.5781" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="29.626" x2="227.8613" y1="547.5781" y2="547.5781"/><text fill="#000000" font-family="Helvetica" font-size="10" x="36.626" y="543.2197">(06)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="61.1533" y="543.2197">Gibt OTP-Best&#228;tigungscode ein</text><polygon fill="#181818" points="742.8203,580.8594,752.8203,584.8594,742.8203,588.8594,746.8203,584.8594" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="243.8613" x2="748.8203" y1="584.8594" y2="584.8594"/><text fill="#000000" font-family="Helvetica" font-size="10" x="250.8613" y="574.6807">(07)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="568.8604">POST /register/verify</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="580.501">{transaction_id, code}</text><line style="stroke:#181818;stroke-width:1;" x1="764.8203" x2="806.8203" y1="610.5" y2="610.5"/><line style="stroke:#181818;stroke-width:1;" x1="806.8203" x2="806.8203" y1="610.5" y2="623.5"/><line style="stroke:#181818;stroke-width:1;" x1="765.8203" x2="806.8203" y1="623.5" y2="623.5"/><polygon fill="#181818" points="775.8203,619.5,765.8203,623.5,775.8203,627.5,771.8203,623.5" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="771.8203" y="606.1416">(08)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="796.3477" y="606.1416">Verifiziere OTP-Code gegen Cache</text><polygon fill="#181818" points="254.8613,645.1406,244.8613,649.1406,254.8613,653.1406,250.8613,649.1406" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="248.8613" x2="753.8203" y1="649.1406" y2="649.1406"/><text fill="#000000" font-family="Helvetica" font-size="10" x="260.8613" y="644.7822">(09)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="285.3887" y="644.7822">201 Created {client_id, status="pending_user_binding"}</text><?plantuml-src XLNHSk8s57tdA-xweKqc6BQPwKp7csI60DbbDWaKI3fja_48-s8Ksv8hoI6GoT_iP-GjFzOh6GYqsGqFHhQaSyyzz-Zg0nTHLiO8ZKQpAFFCpzX2bgPX7aojnY8Z5LnfLC0qU9UbMQBoQhM9V00lbnEU8NJmdaVeGQTxtMjtmtR_l3-i0RWbhQBmO33iNRIwmz6Vet7tOZCFK31bUCGB9WoqCuxqPuFyrHstLkyU71qjqR2J4zg08hQWjVL_HQ8b9XmDyHltuB3n4JgqJniRj7_TwtI7ktmSzkUIgTW3Emu_NxM6dUzmQfLcDdAK1ft1ZR2lKl4bCrmA6A6w9ob-IB1Auk1WDG3_fC8yE0XWq1-DeQamuPhOtuZ76m7WHMvXA5YENa0ABrOwrDrieeXMQ1O5QfhzsokL22ZvQK2iMQu3oGWzSAjykoemCaNXuqCqOo91hmwUmgb2FGlTZ7TRuTxDKmlu25wA2mSDW_9heuhT6F44Rk6fMkhsXPHX8JbniG7374cOsF8j5Bzd1aE22U_cQzeAOwumCc6fU4LyPaoXWsRpYFpXd_tUkJnfHfFc4IkAawRaSMIP_cWDFRpR6_5K4z8WA9xC3CXf9