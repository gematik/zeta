" font-family="Helvetica" font-size="10" x="209.7378" y="904.626">ZETA Client</text><rect fill="#FFE6CC" height="37.2813" rx="2.5" ry="2.5" style="stroke:#D79B00;stroke-width:0.5;" width="116.9492" x="651.4189" y="888.3438"/><text fill="#000000" font-family="Helvetica" font-size="10" x="700.0132" y="904.626">PDP</text><text fill="#000000" font-family="Helvetica" font-size="10" x="658.4189" y="916.2666">Authorization Server</text><path d="M13.626,126.9219 L73.582,126.9219 L73.582,130.5625 L63.582,140.5625 L13.626,140.5625 L13.626,126.9219" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="711.7813" style="stroke:#000000;stroke-width:1.5;" width="1187.1396" x="13.626" y="126.9219"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="700" x="28.626" y="137.2041">alt</text><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="700" x="88.582" y="138.2041">[Kein ZETA Attestation Token vorhanden]</text><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="13.626" x2="1200.7656" y1="682.2188" y2="682.2188"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="700" x="18.626" y="693.501">[ZETA Attestation Token vorhanden (Fast-Path)]</text><polygon fill="#181818" points="692.8936,175.8438,702.8936,179.8438,692.8936,183.8438,696.8936,179.8438" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="243.8613" x2="698.8936" y1="179.8438" y2="179.8438"/><text fill="#000000" font-family="Helvetica" font-size="10" x="250.8613" y="169.665">(01)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="163.8447">POST /register</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="175.4854">{attestation_type="apple", Apple_Attestation_Object, PuK.Client.Sig, redirect_uris}</text><line style="stroke:#181818;stroke-width:1;" x1="714.8936" x2="756.8936" y1="205.4844" y2="205.4844"/><line style="stroke:#181818;stroke-width:1;" x1="756.8936" x2="756.8936" y1="205.4844" y2="218.4844"/><line style="stroke:#181818;stroke-width:1;" x1="715.8936" x2="756.8936" y1="218.4844" y2="218.4844"/><polygon fill="#181818" points="725.8936,214.4844,715.8936,218.4844,725.8936,222.4844,721.8936,218.4844" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="721.8936" y="201.126">(02)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="746.4209" y="201.126">Validiere Apple_Attestation_Object</text><path d="M719.8936,231.4844 L719.8936,275.4844 L954.8936,275.4844 L954.8936,241.4844 L944.8936,231.4844 L719.8936,231.4844" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M944.8936,231.4844 L944.8936,241.4844 L954.8936,241.4844 L944.8936,231.4844" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="245.7666">AuthS verifiziert Apple App Attest Root CA.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="257.4072">Extrahiert Hash(PuK.Client.Sig) aus Objekt</text><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="269.0479">und vergleicht ihn mit dem Payload.</text><path d="M719.8936,286.4063 L719.8936,424.4063 L1178.8936,424.4063 L1178.8936,296.4063 L1168.8936,286.4063 L719.8936,286.4063" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1168.8936,286.4063 L1168.8936,296.4063 L1178.8936,296.4063 L1168.8936,286.4063" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="300.6885">Es werden zwei redirect_uris je App registriert (RFC 8252, claimed-HTTPS</text><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="312.3291">Universal-/App-Links auf einer vom App-Hersteller kontrollierten Domain):</text><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="323.9697">- https://&lt;App-FQDN&gt;/cb/&lt;app&gt;/as = redirect_uri_as</text><text fill="#000000" font-family="Helvetica" font-size="10" x="732.251" y="335.6104">(SekIDP Auth Code Flow, redirection_endpoint des AuthS, nicht /token)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="347.251">- https://&lt;App-FQDN&gt;/cb/&lt;app&gt;/app = redirect_uri_app</text><text fill="#000000" font-family="Helvetica" font-size="10" x="732.251" y="358.8916">(ZETA Guard Auth Code Flow, /token-Endpunkt des AuthS)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="370.5322">Beide Callbacks enden &#252;ber denselben App-Link/Universal-Link in der App;</text><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="382.1729">der ZETA Client unterscheidet den zu nutzenden AuthS-Endpunkt anhand des Pfads.</text><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="393.8135">Die OS-seitige Verkn&#252;pfung erfolgt &#252;ber apple-app-site-association</text><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="405.4541">(Deployment, kein Laufzeit-Flow). Die App ist inkl. redirect_uris bei der gematik</text><text fill="#000000" font-family="Helvetica" font-size="10" x="725.8936" y="417.0947">registriert; der AuthS pr&#252;ft beim DCR, ob die &#252;bergebenen redirect_uris registriert sind.</text><line style="stroke:#181818;stroke-width:1;" x1="714.8936" x2="756.8936" y1="447.0938" y2="447.0938"/><line style="stroke:#181818;stroke-width:1;" x1="756.8936" x2="756.8936" y1="447.0938" y2="460.0938"/><line style="stroke:#181818;stroke-width:1;" x1="715.8936" x2="756.8936" y1="460.0938" y2="460.0938"/><polygon fill="#181818" points="725.8936,456.0938,715.8936,460.0938,725.8936,464.0938,721.8936,460.0938" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="721.8936" y="442.7354">(03)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="746.4209" y="442.7354">Store Client Placeholder (state: pending_user_binding)</text><line style="stroke:#181818;stroke-width:1;" x1="714.8936" x2="756.8936" y1="497.375" y2="497.375"/><line style="stroke:#181818;stroke-width:1;" x1="756.8936" x2="756.8936" y1="497.375" y2="510.375"/><line style="stroke:#181818;stroke-width:1;" x1="715.8936" x2="756.8936" y1="510.375" y2="510.375"/><polygon fill="#181818" points="725.8936,506.375,715.8936,510.375,725.8936,514.375,721.8936,510.375" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="721.8936" y="487.1963">(04)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="746.4209" y="481.376">Generiere OTP &amp; transaction_id</text><text fill="#000000" font-family="Helvetica" font-size="10" x="746.4209" y="493.0166">Speichere Request im tempor&#228;ren Cache</text><polygon fill="#181818" points="40.626,532.0156,30.626,536.0156,40.626,540.0156,36.626,536.0156" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="34.626" x2="703.8936" y1="536.0156" y2="536.0156"/><text fill="#000000" font-family="Helvetica" font-size="10" x="46.626" y="531.6572">(05)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="71.1533" y="531.6572">E-Mail mit OTP-Best&#228;tigungscode (Out-of-Band)</text><polygon fill="#181818" points="254.8613,557.6563,244.8613,561.6563,254.8613,565.6563,250.8613,561.6563" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="248.8613" x2="703.8936" y1="561.6563" y2="561.6563"/><text fill="#000000" font-family="Helvetica" font-size="10" x="260.8613" y="557.2979">(06)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="285.3887" y="557.2979">202 Accepted {transaction_id, message="OTP sent"}</text><polygon fill="#181818" points="221.8613,583.2969,231.8613,587.2969,221.8613,591.2969,225.8613,587.2969" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="29.626" x2="227.8613" y1="587.2969" y2="587.2969"/><text fill="#000000" font-family="Helvetica" font-size="10" x="36.626" y="582.9385">(07)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="61.1533" y="582.9385">Gibt OTP-Best&#228;tigungscode ein</text><polygon fill="#181818" points="692.8936,620.5781,702.8936,624.5781,692.8936,628.5781,696.8936,624.5781" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#181818;stroke-width:1;" x1="243.8613" x2="698.8936" y1="624.5781" y2="624.5781"/><text fill="#000000" font-family="Helvetica" font-size="10" x="250.8613" y="614.3994">(08)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="608.5791">POST /register/verify</text><text fill="#000000" font-family="Helvetica" font-size="10" x="275.3887" y="620.2197">{transaction_id, code}</text><line style="stroke:#181818;stroke-width:1;" x1="714.8936" x2="756.8936" y1="650.2188" y2="650.2188"/><line style="stroke:#181818;stroke-width:1;" x1="756.8936" x2="756.8936" y1="650.2188" y2="663.2188"/><line style="stroke:#181818;stroke-width:1;" x1="715.8936" x2="756.8936" y1="663.2188" y2="663.2188"/><polygon fill="#181818" points="725.8936,659.2188,715.8936,663.2188,725.8936,667.2188,721.8936,663.2188" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="721.8936" y="645.8604">(09)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="746.4209" y="645.8604">Verifiziere OTP-Code gegen C