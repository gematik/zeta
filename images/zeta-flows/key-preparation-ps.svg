)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="73.9106" y="196.7666">Handle_prk_client_sig</text><path d="M185.4624,214.125 L185.4624,247.125 L476.4624,247.125 L476.4624,224.125 L466.4624,214.125 L185.4624,214.125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M466.4624,214.125 L466.4624,224.125 L476.4624,224.125 L466.4624,214.125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="10" x="191.4624" y="228.4072">ZAS &#252;bergibt hash_puk_client_sig als "qualifyingData"</text><text fill="#000000" font-family="Helvetica" font-size="10" x="191.4624" y="240.0479">an TPM2_Certify zur Bindung an den Session-Kontext.</text><polygon fill="#181818" points="53.3833,266.0469,43.3833,270.0469,53.3833,274.0469,49.3833,270.0469" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="47.3833" x2="476.3169" y1="270.0469" y2="270.0469"/><text fill="#000000" font-family="Helvetica" font-size="10" x="59.3833" y="265.6885">(04)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="83.9106" y="265.6885">TPM2_Certify(Handle_prk_ak_sig, Handle_prk_client_sig, hash_puk_client_sig)</text><polygon fill="#181818" points="465.3169,291.6875,475.3169,295.6875,465.3169,299.6875,469.3169,295.6875" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="42.3833" x2="471.3169" y1="295.6875" y2="295.6875"/><text fill="#000000" font-family="Helvetica" font-size="10" x="49.3833" y="291.3291">(05)</text><text fill="#000000" font-family="Helvetica" font-size="10" x="73.9106" y="291.3291">tpm2b_attest, tpmt_signature</text><polygon fill="#181818" points="53.3833,317.3281,43.3833,321.3281,53.3833,325.3281,49.3833,321.3281" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="47.3833" x2="476.3169" y1="321.3281" y2="321.3281"/><text fill="#000000" font-family="Helvet