="spacing" textLength="98.1348" x="872.5417" y="1317.2153">credentialBlob,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="107.8594" x="867.6794" y="1332.3481">encryptedSecret</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="8.271" x="913.3413" y="1347.481">}</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg14"><polygon fill="#000000" points="449.9912,1377.6797,439.9912,1381.6797,449.9912,1385.6797,445.9912,1381.6797" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="443.9912" x2="696.2324" y1="1381.6797" y2="1381.6797"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="210.1265" x="463.0486" y="1376.6138">credentialBlob, encryptedSecret</text></g><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg15"><polygon fill="#000000" points="129.5366,1421.9453,119.5366,1425.9453,129.5366,1429.9453,125.5366,1425.9453" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="123.5366" x2="437.9912" y1="1425.9453" y2="1425.9453"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="183.6377" x="186.9451" y="1405.7466">TPM2_ActivateCredential</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="220.27" x="168.6289" y="1420.8794">(credentialBlob, encryptedSecret)</text></g><path d="M123,1438.9453 L123,1508.9453 L492,1508.9453 L492,1448.9453 L482,1438.9453 L123,1438.9453" fill="#FFFDE7" style="stroke:#999999;stroke-width:1;"/><path d="M482,1438.9453 L482,1448.9453 L492,1448.9453 L482,1438.9453" fill="#FFFDE7" style="stroke:#999999;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="109.6812" x="129" y="1456.0122">TPM pr&#252;ft intern:</text><text fill="#00000