t-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="8.271" x="1327.1318" y="3135.2388">{</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="197.793" x="1236.5032" y="3150.3716">pcr_values: { pcr23: "...", ... },</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="289.2754" x="1190.762" y="3165.5044">posture: { os_version, product_version, ... },</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="58.2017" x="1306.2988" y="3180.6372">client_id,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="98.1221" x="1286.3386" y="3195.77">ak_bound: true</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="8.271" x="1327.1318" y="3210.9028">}</text></g><path d="M1529,3228.9688 L1529,3328.9688 L1989,3328.9688 L1989,3238.9688 L1979,3228.9688 L1529,3228.9688" fill="#FFFDE7" style="stroke:#999999;stroke-width:1;"/><path d="M1979,3228.9688 L1979,3238.9688 L1989,3238.9688 L1979,3228.9688" fill="#FFFDE7" style="stroke:#999999;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="233.3779" x="1535" y="3246.0356">RATS: Endorser (RFC 9334 &#167;3.2)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="111.8584" x="1535" y="3261.1685">OPA pr&#252;ft gegen:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="439.3848" x="1535" y="3276.3013">- Referenzwerte f&#252;r PCR 23\n    (gemeldete Hashes des Herstellers)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="155.9048" x="1535" y="3291.4341">- Erlaubte OS-Versionen</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="181.7842" x="1