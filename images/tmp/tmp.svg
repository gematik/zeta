0669">nonce (Freshness, Replay-Schutz)</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg23"><polygon fill="#000000" points="449.9912,2028.3984,439.9912,2032.3984,449.9912,2036.3984,445.9912,2032.3984" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="443.9912" x2="696.2324" y1="2032.3984" y2="2032.3984"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="191.1533" x="472.5352" y="2012.1997">gRPC: AttestationRequest</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="158.3232" x="488.9502" y="2027.3325">{ nonce, pcr_selection }</text></g><path d="M443,2045.3984 L443,2085.3984 L633,2085.3984 L633,2055.3984 L623,2045.3984 L443,2045.3984" fill="#FFFDE7" style="stroke:#999999;stroke-width:1;"/><path d="M623,2045.3984 L623,2055.3984 L633,2055.3984 L623,2045.3984" fill="#FFFDE7" style="stroke:#999999;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="169.8696" x="449" y="2062.4653">ZAS fordert TPM Quote an</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="162.3032" x="449" y="2077.5981">mit der Nonce des AuthS</text><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg24"><polygon fill="#000000" points="129.5366,2122.9297,119.5366,2126.9297,129.5366,2130.9297,125.5366,2126.9297" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="123.5366" x2="437.9912" y1="2126.9297" y2="2126.9297"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="91.146" x="233.1909" y="2106.731">TPM2_Quote</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="214.3096" x="171.6091" y="2121.8638">(pcr_selection=[0..7, 23], nonce)</text></g><g class="message" data-