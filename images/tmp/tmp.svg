="3809.7578" y2="3809.7578"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="106.3296" x="864.312" y="3729.0278">403 Forbidden</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="8.271" x="913.3413" y="3744.1606">{</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="151.2456" x="845.9863" y="3759.2935">error: "access_denied",</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="248.7837" x="797.2173" y="3774.4263">error_description: "attestation_failed",</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="236.8564" x="803.1809" y="3789.5591">attestation_result: "contraindicated"</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="8.271" x="913.3413" y="3804.6919">}</text></g><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="1989.3848" x="5" y="3845.3242"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="1994.3848" y1="3845.3242" y2="3845.3242"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="1994.3848" y1="3848.3242" y2="3848.3242"/><rect fill="#FFFFFF" height="23.1328" style="stroke:#000000;stroke-width:1;" width="549.2407" x="725.072" y="3834.7578"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="530.7148" x="731.072" y="3850.8247">Phase 4: Resource Access (Relying Party konsumiert Attestation Result)</text><path d="M618,3872.8906 L618,3942.8906 L1216,3942.8906 L1216,3882.8906 L1206,3872.8906 L618,3872.8906" fill="#E3F2FD" style="stroke:#999999;stroke-width:1;"/><path d="M1206,3872.8906 L1206,3882.8906 L1216,3882.8906 L1206,3872.8906" fill="#E3F2FD" style="stroke:#999999;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="266.3286" x="706.8777" y="3889.9575">RATS: Relying Party (RFC 9334 &#167;3.5)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="231.7466" x="706.8777" y="3905.0903">AuthS ist gleichzeitig Relying Party:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="411.3789" x="706.8777" y="3920.2231">Das Attestation Result ist bereits im Access Token eingebettet.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="384.6616" x="706.8777" y="3935.356">Der PEP (HTTP Proxy) pr&#252;ft das Token und gew&#228;hrt Zugriff.</text><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg41"><polygon fill="#000000" points="1125.7212,3980.6875,1135.7212,3984.6875,1125.7212,3988.6875,1129.7212,3984.6875" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="697.2324" x2="1131.7212" y1="3984.6875" y2="3984.6875"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="394.2021" x="720.3757" y="3964.4888">HTTP Request + Authorization: DPoP &lt;access_token&gt;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="135.7256" x="849.614" y="3979.6216">(via PEP HTTP Proxy)</text></g><g class="message" data-entity-1="part4" data-entity-2="part4" id="msg42"><line style="stroke:#000000;stroke-width:1;" x1="1137.7212" x2="1179.7212" y1="4044.0859" y2="4044.0859"/><line style="stroke:#000000;stroke-width:1;" x1="1179.7212" x2="1179.7212" y1="4044.0859" y2="4057.0859"/><line style="stroke:#000000;stroke-width:1;" x1="1138.7212" x2="1179.7212" y1="4057.0859" y2="4057.0859"/><polygon fill="#000000" points="1148.7212,4053.0859,1138.7212,4057.0859,1148.7212,4061.0859,1144.7212,4057.0859" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="