;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="1137.7212" x2="1697.7368" y1="1050.5547" y2="1050.5547"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="190.1187" x="1325.6697" y="1030.356">EK-Zertifikatskette validieren</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="83.5415" x="1378.9583" y="1045.4888">(OCSP / CRL)</text></g><g class="message" data-entity-1="part6" data-entity-2="part4" id="msg11"><polygon fill="#000000" points="1148.7212,1075.6875,1138.7212,1079.6875,1148.7212,1083.6875,1144.7212,1079.6875" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="1142.7212" x2="1702.7368" y1="1079.6875" y2="1079.6875"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="103.1177" x="1369.1702" y="1074.6216">Validation OK &#10003;</text></g><path d="M1142,1092.6875 L1142,1207.6875 L1528,1207.6875 L1528,1102.6875 L1518,1092.6875 L1142,1092.6875" fill="#FFFDE7" style="stroke:#999999;stroke-width:1;"/><path d="M1518,1092.6875 L1518,1102.6875 L1528,1102.6875 L1518,1092.6875" fill="#FFFDE7" style="stroke:#999999;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="365.7773" x="1148" y="1109.7544">RATS: Verifier pr&#252;ft Endorsement (RFC 9334 &#167;3.4)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="211.8784" x="1148" y="1124.8872">AuthS f&#252;hrt MakeCredential aus:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="168.2192" x="1148" y="1140.02">credentialBlob = Encrypt(</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="90.2891" x="1156.2646" y="1155.1528">EK_PublicKey,</text><text fill="#000000" font-family="Verdana" font-size="13" leng