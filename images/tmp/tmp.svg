M (Hersteller)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="251.2021" x="449" y="595.6997">ZAS ist bereit f&#252;r Attestation-Requests</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="1989.3848" x="5" y="629.332"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="1994.3848" y1="629.332" y2="629.332"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="1994.3848" y1="632.332" y2="632.332"/><rect fill="#FFFFFF" height="23.1328" style="stroke:#000000;stroke-width:1;" width="574.9233" x="712.2307" y="618.7656"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="556.3975" x="718.2307" y="634.8325">Phase 1: OAuth Dynamic Client Registration (DCR) &#8212; EK &amp; AK Registrierung</text><path d="M618,656.8984 L618,711.8984 L1216,711.8984 L1216,666.8984 L1206,656.8984 L618,656.8984" fill="#E3F2FD" style="stroke:#999999;stroke-width:1;"/><path d="M1206,656.8984 L1206,666.8984 L1216,666.8984 L1206,656.8984" fill="#E3F2FD" style="stroke:#999999;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="360.5215" x="670.9753" y="673.9653">RATS: Endorsement Provisioning (RFC 9334 &#167;3.2)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="483.1836" x="670.9753" y="689.0981">EK-Zertifikat = vom Hersteller signiertes Endorsement &#8594; Vertrauensanker</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="434.9985" x="670.9753" y="704.231">AK-PublicKey  = wird im MakeCredential-Protokoll an EK gebunden</text><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg5"><polygon fill="#000000" points="449.9912,734.4297,439.9912,738.4297,449.9912,742.4297,445.9912,738.4297" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="443.9912" x2="696.2324" y1="738.4297" y2="738.4297"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="234.2412" x="450.9912" y="733.3638">Anfrage: EK-Zertifikat, AK-PublicKey</text></g><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg6"><polygon fill="#000000" points="129.5366,778.6953,119.5366,782.6953,129.5366,786.6953,125.5366,782.6953" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="123.5366" x2="437.9912" y1="782.6953" y2="782.6953"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="140.6006" x="208.4636" y="762.4966">TPM2_ReadPublic(EK)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="141.2798" x="208.124" y="777.6294">TPM2_ReadPublic(AK)</text></g><g class="message" data-entity-1="part1" data-entity-2="part2" id="msg7"><polygon fill="#000000" points="426.9912,807.8281,436.9912,811.8281,426.9912,815.8281,430.9912,811.8281" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="118.5366" x2="432.9912" y1="811.8281" y2="811.8281"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="181.2573" x="188.1353" y="806.7622">EK_PublicKey, AK_PublicKey</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg8"><polygon fill="#000000" points="685.2324,867.2266,695.2324,871.2266,685.2324,875.2266,689.2324,871.2266" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="438.9912" x2="691.2324" y1="871.2266" y2="871.2266"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="143.603" x="496.3103" y="835.895">ek_certificate_chain[ ]</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="97.7729" x="519.2253" y="